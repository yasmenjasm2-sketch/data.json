<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب انضمام للإدارة - FawakihAI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background-color: #0b0714; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .register-box { background: #1a1525; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #3498db; box-shadow: 0 0 20px rgba(52, 152, 219, 0.2); width: 90%; max-width: 400px; }
        .register-box h2 { color: #3498db; margin-bottom: 20px; }
        .register-box p { color: #ccc; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
        
        .register-box input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; text-align: center; font-size: 16px; outline: none; }
        .register-box input:focus { border-color: #3498db; }
        
        .register-box button { width: 100%; background: #3498db; color: #fff; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .register-box button:hover { background: #2980b9; }

        #success-msg { display: none; color: #2ecc71; margin-top: 15px; font-weight: bold; }
        #error-msg { display: none; color: #e74c3c; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="register-box" id="reg-container">
    <h2>📝 طلب انضمام للإدارة</h2>
    <p>يرجى تعبئة البيانات التالية لإنشاء حساب إداري. لن تتمكن من الدخول حتى يتم قبول طلبك من الإدارة العليا.</p>
    
    <input type="text" id="req-name" placeholder="الاسم الذي سيظهر للأعضاء (مثال: المدير فلان)">
    <input type="text" id="req-username" placeholder="يوزر الإدارة المخفي (مثال: @admin_1)">
    <input type="password" id="req-password" placeholder="اختر كلمة مرور لدخول اللوحة">
    
    <button onclick="sendAdminRequest()">إرسال الطلب</button>
    
    <p id="error-msg">يرجى تعبئة جميع الحقول بشكل صحيح!</p>
    <p id="success-msg">✅ تم إرسال طلبك بنجاح! يرجى الانتظار حتى يتم قبولك، ثم توجه لصفحة تسجيل الدخول.</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: atob("QUl6YVN5RDNlUkZIRGhPdEtsbGkzS0E4dlV5RTEtLUM1RjQ3VVl3"),
        databaseURL: atob("aHR0cHM6Ly9jaGF0YXBpLTFjYTcxLWRlZmF1bHQtcnRkYi5ldXJvcGUtd2VzdDEuZmlyZWJhc2VkYXRhYmFzZS5hcHA="),
        projectId: atob("Y2hhdGFwaS0xY2E3MQ==")
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    function sendAdminRequest() {
        const name = document.getElementById("req-name").value.trim();
        const user = document.getElementById("req-username").value.trim();
        const pass = document.getElementById("req-password").value.trim();

        if (name.length < 2 || user.length < 3 || pass.length < 4) {
            document.getElementById("error-msg").style.display = "block";
            return;
        }
        document.getElementById("error-msg").style.display = "none";

        // توليد Device ID خاص بجهاز الأدمن الجديد
        let newDeviceId = localStorage.getItem("chat_device_id");
        if (!newDeviceId) {
            newDeviceId = 'admin_panel_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem("chat_device_id", newDeviceId);
        }

        const requestData = {
            deviceId: newDeviceId,
            name: name,
            adminUsername: user,
            adminPassword: pass,
            timestamp: Date.now()
        };

        // إرسال الطلب إلى قاعدة البيانات
        db.ref('admin_requests/' + newDeviceId).set(requestData).then(() => {
            document.getElementById("req-name").style.display = "none";
            document.getElementById("req-username").style.display = "none";
            document.getElementById("req-password").style.display = "none";
            document.querySelector("button").style.display = "none";
            document.getElementById("success-msg").style.display = "block";
        }).catch(err => {
            alert("حدث خطأ في الاتصال، حاول مرة أخرى.");
        });
    }
</script>

</body>
</html>
