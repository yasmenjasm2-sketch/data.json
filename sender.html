<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإرسال الخاص للإدارة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        body {
            background-color: #0b0714;
            color: #ffffff;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .panel-container {
            background: rgba(20, 15, 30, 0.9);
            border: 1px solid #8e44ad;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(142, 68, 173, 0.3);
            margin-top: 20px;
        }

        h2 {
            text-align: center;
            color: #d6b4fc;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(187, 134, 252, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #a0a0b0;
            font-size: 13px;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .account-row {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(187, 134, 252, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            transition: 0.3s;
        }

        .account-row:hover {
            border-color: #bb86fc;
        }

        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #bb86fc;
            font-weight: bold;
        }

        .remove-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Tajawal', sans-serif;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid rgba(187, 134, 252, 0.3);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        .input-admin-id {
            border-color: #f39c12 !important;
            color: #f39c12 !important;
        }
        
        .input-name {
            border-color: #2ecc71 !important;
        }

        input:focus, textarea:focus {
            box-shadow: 0 0 10px rgba(187, 134, 252, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 70px;
            border-color: #3498db !important;
        }

        .btn-add {
            width: 100%;
            background: transparent;
            color: #bb86fc;
            border: 2px dashed #bb86fc;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-add:hover {
            background: rgba(187, 134, 252, 0.1);
        }

        .btn-send {
            width: 100%;
            background: linear-gradient(90deg, #8e44ad, #2980b9);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(142, 68, 173, 0.6);
        }

        .btn-send:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 15px;
            font-weight: bold;
            color: #fca311;
            display: none;
            padding: 10px;
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="panel-container">
        <h2>📩 إرسال خاص للأدمنية المتعدد</h2>
        <div class="subtitle">
            كل رسالة لها حساب وهمي ثابت (حسب الاسم) وتستهدف أدمن معين.<br>
            الرسالة الأولى ترسل فوراً، والباقي بفاصل زمني 30 ثانية لكل رسالة لتجنب الحظر.
        </div>
        
        <div id="accountsContainer"></div>

        <button class="btn-add" id="addBtn" onclick="addAccountRow()">+ إضافة رسالة / حساب آخر</button>
        <button class="btn-send" id="sendBtn" onclick="startSending()">🚀 بدء إرسال جميع الرسائل</button>
        
        <div id="statusMsg" class="status"></div>
    </div>

    <script>
        // إعدادات فايربيس
        const firebaseConfig = {
            apiKey: "AIzaSyD3eRFHDhOtKlli3KA8vUyE1--C5F47UYw",
            databaseURL: "https://chatapi-1ca71-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chatapi-1ca71",
            storageBucket: "chatapi-1ca71.firebasestorage.app",
            appId: "1:1057989927219:android:b3e3b7304228b526b21e46"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        let rowCount = 0;
        const maxRows = 10;

        // دالة لإنشاء آيدي هاتف أندرويد حقيقي (16 حرف ورقم Hex) لا يحتوي على كلمة bot
        function generateRealAndroidId() {
            const chars = '0123456789abcdef';
            let androidId = '';
            for (let i = 0; i < 16; i++) {
                androidId += chars[Math.floor(Math.random() * chars.length)];
            }
            return androidId;
        }

        // دالة لربط وتثبيت الآيدي بالاسم المدخل (حتى لو تم الإرسال عدة مرات لنفس الاسم لن يكرر الحساب)
        function getPersistentIdForName(name) {
            let cleanName = name.trim().toLowerCase(); // تنظيف الاسم لمنع الأخطاء
            let savedIds = JSON.parse(localStorage.getItem('real_sender_devices')) || {};
            
            if (savedIds[cleanName]) {
                return savedIds[cleanName]; // إرجاع الآيدي الحقيقي المحفوظ مسبقاً لهذا الاسم
            } else {
                let newDeviceId = generateRealAndroidId(); // صنع آيدي أندرويد حقيقي
                savedIds[cleanName] = newDeviceId;
                localStorage.setItem('real_sender_devices', JSON.stringify(savedIds));
                return newDeviceId;
            }
        }

        // إضافة حقل رسالة جديد
        function addAccountRow() {
            if (rowCount >= maxRows) {
                alert("الحد الأقصى هو 10 رسائل في الدفعة الواحدة!");
                return;
            }

            rowCount++;
            const container = document.getElementById('accountsContainer');
            
            const rowDiv = document.createElement('div');
            rowDiv.className = 'account-row';
            rowDiv.id = `row-${rowCount}`;
            
            rowDiv.innerHTML = `
                <div class="account-header">
                    <span>الرسالة رقم ${rowCount}</span>
                    ${rowCount > 1 ? `<button class="remove-btn" onclick="removeRow('row-${rowCount}')">حذف</button>` : ''}
                </div>
                <input type="text" class="input-name" placeholder="اسم المرسل (مثال: سارة) - سيتم تثبيت حسابها بهذا الاسم" required>
                <input type="text" class="input-admin-id" placeholder="آيدي الأدمن المستلم (مثال: 1111)" required>
                <textarea class="input-msg" placeholder="محتوى الرسالة التي ستصل للخاص..." required></textarea>
            `;
            
            container.appendChild(rowDiv);
            
            if(rowCount >= maxRows) {
                document.getElementById('addBtn').style.display = 'none';
            }
        }

        function removeRow(rowId) {
            document.getElementById(rowId).remove();
            rowCount--;
            document.getElementById('addBtn').style.display = 'block';
            
            // إعادة ترقيم الرسائل
            let rows = document.querySelectorAll('.account-row');
            rows.forEach((row, index) => {
                row.querySelector('.account-header span').innerText = `الرسالة رقم ${index + 1}`;
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function startSending() {
            let rows = document.querySelectorAll('.account-row');
            let tasks = [];

            // جمع بيانات جميع الحقول
            rows.forEach(row => {
                let name = row.querySelector('.input-name').value.trim();
                let adminId = row.querySelector('.input-admin-id').value.trim();
                let msg = row.querySelector('.input-msg').value.trim();
                
                if(name && msg && adminId) {
                    tasks.push({name: name, adminId: adminId, msg: msg});
                }
            });

            if (tasks.length === 0) {
                alert("يرجى تعبئة جميع الحقول المطلوبة في الرسائل.");
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            const statusMsg = document.getElementById('statusMsg');
            const addBtn = document.getElementById('addBtn');
            
            sendBtn.disabled = true;
            addBtn.style.display = 'none';
            statusMsg.style.display = "block";

            try {
                for (let i = 0; i < tasks.length; i++) {
                    let task = tasks[i];
                    
                    // استخراج آيدي ثابت وحقيقي للمرسل بناءً على اسمه
                    let deviceId = getPersistentIdForName(task.name);
                    
                    // تحديث بيانات المستخدم ليظهر في النظام كجهاز أندرويد حقيقي
                    await db.ref('users/' + deviceId).update({
                        name: task.name,
                        image: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                        lastLogin: Date.now(),
                        deviceType: "android", // تمويه إضافي
                        isBot: false // تمويه إضافي
                    });

                    // مسار الخاص المباشر بين هذا الحساب والأدمن المستهدف
                    let privateRoomPath = `private_messages/user_${deviceId}_admin_${task.adminId}`;

                    // إرسال الرسالة
                    await db.ref(privateRoomPath).push({
                        deviceId: deviceId,
                        sender: task.name,
                        senderImg: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                        adminId: null, // المرسل ليس أدمن
                        text: task.msg,
                        image: null,
                        timestamp: Date.now()
                    });

                    statusMsg.style.color = "#a5f3bc";
                    statusMsg.innerText = `✅ تم الإرسال من [${task.name}] إلى الأدمن [${task.adminId}]`;

                    // نظام التأخير 30 ثانية للرسائل المتبقية فقط
                    if (i < tasks.length - 1) {
                        for(let sec = 30; sec > 0; sec--) {
                            statusMsg.style.color = "#fca311";
                            statusMsg.innerText = `⏳ جاري تأخير الرسالة التالية لتجنب الحظر... الانتظار: ${sec} ثانية`;
                            await sleep(1000);
                        }
                    }
                }

                statusMsg.style.color = "#a5f3bc";
                statusMsg.innerText = "🎉 تم إرسال جميع الرسائل بنجاح وبدون مشاكل!";
                
            } catch (error) {
                console.error("خطأ:", error);
                statusMsg.style.color = "#ff4d4d";
                statusMsg.innerText = "❌ حدث خطأ في الاتصال بقاعدة البيانات.";
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = "🚀 بدء إرسال جميع الرسائل";
                if(rowCount < maxRows) addBtn.style.display = 'block';
            }
        }

        window.onload = () => {
            // فتح حقل واحد كبداية
            addAccountRow();
        };
    </script>
</body>
</html>
