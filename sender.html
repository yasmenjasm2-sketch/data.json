<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإرسال الذكية (عام + خاص)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        body {
            background-color: #0b0714;
            color: #ffffff;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .panel-container {
            background: rgba(20, 15, 30, 0.9);
            border: 1px solid #8e44ad;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 0 30px rgba(142, 68, 173, 0.3);
            margin-top: 20px;
        }

        h2 {
            text-align: center;
            color: #d6b4fc;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(187, 134, 252, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #a0a0b0;
            font-size: 13px;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .account-row {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(187, 134, 252, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            transition: 0.3s;
        }

        .account-row:hover {
            border-color: #bb86fc;
        }

        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #bb86fc;
            font-weight: bold;
        }

        .remove-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
        }

        select, input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid rgba(187, 134, 252, 0.3);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            transition: 0.3s;
        }

        select { border-color: #9b59b6 !important; cursor: pointer; }
        .input-name { border-color: #2ecc71 !important; }
        .input-admin-id { border-color: #f39c12 !important; color: #f39c12 !important; }
        textarea { border-color: #3498db !important; min-height: 70px; resize: vertical; }

        .btn-add {
            width: 100%;
            background: transparent;
            color: #bb86fc;
            border: 2px dashed #bb86fc;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .btn-send {
            width: 100%;
            background: linear-gradient(90deg, #8e44ad, #2980b9);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-send:disabled { background: #555; cursor: not-allowed; }

        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
            color: #fca311;
            display: none;
            padding: 10px;
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="panel-container">
        <h2>🚀 لوحة الإرسال الذكية (عام + خاص)</h2>
        <div class="subtitle">
            • الحسابات تُثبت حسب الاسم (لن يتكرر الحساب لنفس الاسم).<br>
            • شات العام لا يحتاج آيدي، بينما الخاص يحتاج آيدي الأدمن.<br>
            • فاصل زمني 30 ثانية بين كل رسالة لضمان الأمان.
        </div>
        
        <div id="accountsContainer"></div>

        <button class="btn-add" id="addBtn" onclick="addAccountRow()">+ إضافة عملية إرسال أخرى</button>
        <button class="btn-send" id="sendBtn" onclick="startSending()">🚀 بدء التنفيذ المتعدد</button>
        
        <div id="statusMsg" class="status"></div>
    </div>

    <script>
        // إعدادات فايربيس
        const firebaseConfig = {
            apiKey: "AIzaSyD3eRFHDhOtKlli3KA8vUyE1--C5F47UYw",
            databaseURL: "https://chatapi-1ca71-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chatapi-1ca71",
            storageBucket: "chatapi-1ca71.firebasestorage.app",
            appId: "1:1057989927219:android:b3e3b7304228b526b21e46"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let rowCount = 0;
        const maxRows = 10;

        // توليد آيدي أندرويد حقيقي (16 خانة Hex)
        function generateRealAndroidId() {
            const chars = '0123456789abcdef';
            let id = '';
            for (let i = 0; i < 16; i++) id += chars[Math.floor(Math.random() * chars.length)];
            return id;
        }

        // تثبيت الآيدي بناءً على الاسم لمنع تكرار الحسابات
        function getPersistentIdForName(name) {
            let cleanName = name.trim().toLowerCase();
            let savedIds = JSON.parse(localStorage.getItem('fixed_user_devices')) || {};
            
            if (savedIds[cleanName]) {
                return savedIds[cleanName];
            } else {
                let newId = generateRealAndroidId();
                savedIds[cleanName] = newId;
                localStorage.setItem('fixed_user_devices', JSON.stringify(savedIds));
                return newId;
            }
        }

        // إخفاء أو إظهار حقل الآيدي بناءً على نوع الإرسال
        function updateRowUI(rowId) {
            const row = document.getElementById(rowId);
            const type = row.querySelector('.send-type').value;
            const adminInput = row.querySelector('.input-admin-id');
            
            if (type === "public") {
                adminInput.style.display = "none";
                adminInput.removeAttribute('required');
            } else {
                adminInput.style.display = "block";
                adminInput.setAttribute('required', 'true');
            }
        }

        function addAccountRow() {
            if (rowCount >= maxRows) {
                alert("الحد الأقصى 10 عمليات!");
                return;
            }
            rowCount++;
            const container = document.getElementById('accountsContainer');
            const rowId = `row-${rowCount}`;
            
            const rowDiv = document.createElement('div');
            rowDiv.className = 'account-row';
            rowDiv.id = rowId;
            
            rowDiv.innerHTML = `
                <div class="account-header">
                    <span>المهمة رقم ${rowCount}</span>
                    <button class="remove-btn" onclick="removeRow('${rowId}')">حذف</button>
                </div>
                <select class="send-type" onchange="updateRowUI('${rowId}')">
                    <option value="private">إرسال خاص (إلى أدمن محدد)</option>
                    <option value="public">إرسال عام (شات العام)</option>
                </select>
                <input type="text" class="input-name" placeholder="اسم المرسل (مثال: فهد)" required>
                <input type="text" class="input-admin-id" placeholder="آيدي الأدمن المستلم (مطلوب للخاص)" required>
                <textarea class="input-msg" placeholder="اكتب نص الرسالة هنا..." required></textarea>
            `;
            
            container.appendChild(rowDiv);
            updateRowUI(rowId);
        }

        function removeRow(rowId) {
            document.getElementById(rowId).remove();
            rowCount--;
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        async function startSending() {
            let rows = document.querySelectorAll('.account-row');
            let tasks = [];

            rows.forEach(row => {
                let type = row.querySelector('.send-type').value;
                let name = row.querySelector('.input-name').value.trim();
                let adminId = row.querySelector('.input-admin-id').value.trim();
                let msg = row.querySelector('.input-msg').value.trim();
                
                if (name && msg && (type === 'public' || adminId)) {
                    tasks.push({ type, name, adminId, msg });
                }
            });

            if (tasks.length === 0) {
                alert("يرجى ملء البيانات المطلوبة.");
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            const statusMsg = document.getElementById('statusMsg');
            sendBtn.disabled = true;
            statusMsg.style.display = "block";

            try {
                for (let i = 0; i < tasks.length; i++) {
                    let task = tasks[i];
                    let deviceId = getPersistentIdForName(task.name);

                    // 1. تسجيل/تحديث الحساب في قاعدة البيانات ليظهر كحساب حقيقي
                    await db.ref('users/' + deviceId).update({
                        name: task.name,
                        image: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                        lastLogin: Date.now(),
                        deviceType: "android"
                    });

                    // 2. تحديد المسار بناءً على الاختيار
                    let targetPath = "";
                    if (task.type === "public") {
                        targetPath = "messages"; // مسار الشات العام
                    } else {
                        targetPath = `private_messages/user_${deviceId}_admin_${task.adminId}`; // مسار الخاص
                    }

                    // 3. إرسال الرسالة
                    await db.ref(targetPath).push({
                        deviceId: deviceId,
                        sender: task.name,
                        senderImg: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                        text: task.msg,
                        timestamp: Date.now()
                    });

                    statusMsg.style.color = "#a5f3bc";
                    statusMsg.innerText = `✅ تم بنجاح: [${task.name}] أرسل إلى [${task.type === 'public' ? 'العام' : 'خاص ' + task.adminId}]`;

                    // 4. نظام التأخير 30 ثانية (إلا في آخر رسالة)
                    if (i < tasks.length - 1) {
                        for (let sec = 30; sec > 0; sec--) {
                            statusMsg.style.color = "#fca311";
                            statusMsg.innerText = `⏳ تم الإرسال.. انتظار ${sec} ثانية قبل العملية التالية لضمان عدم الحظر...`;
                            await sleep(1000);
                        }
                    }
                }

                statusMsg.style.color = "#a5f3bc";
                statusMsg.innerHTML = "🎉 اكتملت جميع العمليات بنجاح!<br>تم تثبيت الحسابات وإرسال الرسائل.";

            } catch (error) {
                statusMsg.style.color = "#ff4d4d";
                statusMsg.innerText = "❌ حدث خطأ: " + error.message;
            } finally {
                sendBtn.disabled = false;
            }
        }

        window.onload = addAccountRow;
    </script>
</body>
</html>
