<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم والإرسال التلقائي المتقدم</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        body {
            background-color: #0b0714;
            color: #ffffff;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .panel-container {
            background: rgba(20, 15, 30, 0.9);
            border: 1px solid rgba(187, 134, 252, 0.4);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
            margin-top: 20px;
        }

        h2 {
            text-align: center;
            color: #d6b4fc;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(187, 134, 252, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #a0a0b0;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .account-row {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(187, 134, 252, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #bb86fc;
            font-weight: bold;
        }

        .remove-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Tajawal', sans-serif;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid rgba(187, 134, 252, 0.3);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        input:focus, textarea:focus {
            border-color: #bb86fc;
            box-shadow: 0 0 10px rgba(187, 134, 252, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        .btn-add {
            width: 100%;
            background: transparent;
            color: #bb86fc;
            border: 2px dashed #bb86fc;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-add:hover {
            background: rgba(187, 134, 252, 0.1);
        }

        .btn-send {
            width: 100%;
            background: linear-gradient(90deg, #8e2de2, #4a00e0);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(142, 45, 226, 0.6);
        }

        .btn-send:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 15px;
            font-weight: bold;
            color: #fca311;
            display: none;
        }
    </style>
</head>
<body>

    <div class="panel-container">
        <h2>لوحة التحكم المتقدمة 🚀</h2>
        <div class="subtitle">الحد الأقصى 10 حسابات مع فاصل 30 ثانية بين كل رسالة</div>
        
        <div id="accountsContainer">
            </div>

        <button class="btn-add" id="addBtn" onclick="addAccountRow()">+ إضافة حساب ورسالة أخرى</button>
        <button class="btn-send" id="sendBtn" onclick="startSending()">🚀 بدء إرسال الجميع</button>
        
        <div id="statusMsg" class="status"></div>
    </div>

    <script>
        // إعدادات فايربيس الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyD3eRFHDhOtKlli3KA8vUyE1--C5F47UYw",
            databaseURL: "https://chatapi-1ca71-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chatapi-1ca71",
            storageBucket: "chatapi-1ca71.firebasestorage.app",
            appId: "1:1057989927219:android:b3e3b7304228b526b21e46"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let rowCount = 0;
        const maxRows = 10;

        // دالة لإنشاء آيدي يشبه آيدي أجهزة الأندرويد الحقيقية (16 حرف ورقم)
        function generateRealDeviceId() {
            const chars = '0123456789abcdef';
            let id = '';
            for (let i = 0; i < 16; i++) {
                id += chars[Math.floor(Math.random() * chars.length)];
            }
            return id;
        }

        // دالة للحصول على آيدي ثابت لنفس الاسم لعدم تكرار الحسابات
        function getPersistentIdForName(name) {
            let savedIds = JSON.parse(localStorage.getItem('saved_users_ids')) || {};
            // إذا كان الاسم مسجل مسبقاً، استرجع الآيدي الخاص به
            if (savedIds[name]) {
                return savedIds[name];
            } else {
                // إذا كان اسماً جديداً، اصنع له آيدي جديد واحفظه
                let newId = generateRealDeviceId();
                savedIds[name] = newId;
                localStorage.setItem('saved_users_ids', JSON.stringify(savedIds));
                return newId;
            }
        }

        // دالة لإضافة حقل اسم ورسالة جديد
        function addAccountRow() {
            if (rowCount >= maxRows) {
                alert("الحد الأقصى هو 10 حسابات في المرة الواحدة!");
                return;
            }

            rowCount++;
            const container = document.getElementById('accountsContainer');
            
            const rowDiv = document.createElement('div');
            rowDiv.className = 'account-row';
            rowDiv.id = `row-${rowCount}`;
            
            rowDiv.innerHTML = `
                <div class="account-header">
                    <span>حساب ورسالة رقم ${rowCount}</span>
                    <button class="remove-btn" onclick="removeRow('row-${rowCount}')">حذف</button>
                </div>
                <input type="text" class="input-name" placeholder="اسم المستخدم (مثال: سارة)" required>
                <textarea class="input-msg" placeholder="الرسالة الخاصة بهذا المستخدم..." required></textarea>
            `;
            
            container.appendChild(rowDiv);
            
            // إخفاء زر الإضافة إذا وصلنا للحد الأقصى
            if(rowCount >= maxRows) {
                document.getElementById('addBtn').style.display = 'none';
            }
        }

        // دالة لحذف حقل
        function removeRow(rowId) {
            document.getElementById(rowId).remove();
            rowCount--;
            document.getElementById('addBtn').style.display = 'block';
            
            // إعادة ترتيب العناوين
            let rows = document.querySelectorAll('.account-row');
            rows.forEach((row, index) => {
                row.querySelector('.account-header span').innerText = `حساب ورسالة رقم ${index + 1}`;
            });
        }

        // دالة لتأخير الوقت (نظام الـ 30 ثانية)
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // دالة الإرسال الرئيسية
        async function startSending() {
            let rows = document.querySelectorAll('.account-row');
            let tasks = [];

            // تجميع البيانات من جميع الحقول
            rows.forEach(row => {
                let name = row.querySelector('.input-name').value.trim();
                let msg = row.querySelector('.input-msg').value.trim();
                if(name && msg) {
                    tasks.push({name: name, msg: msg});
                }
            });

            if (tasks.length === 0) {
                alert("يرجى تعبئة حقل واحد على الأقل (الاسم والرسالة).");
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            sendBtn.disabled = true;
            statusMsg.style.display = "block";

            try {
                // حلقة للمرور على جميع الحسابات المرسلة
                for (let i = 0; i < tasks.length; i++) {
                    let task = tasks[i];
                    
                    // استخراج أو إنشاء آيدي ثابت لهذا الاسم
                    let deviceId = getPersistentIdForName(task.name);
                    
                    // تحديث/إنشاء بيانات المستخدم في القاعدة لتثبيته كحساب حقيقي
                    await db.ref('users/' + deviceId).set({
                        name: task.name,
                        image: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                        lastLogin: Date.now()
                    });

                    // إرسال الرسالة إلى الشات
                    await db.ref('messages_general').push({
                        deviceId: deviceId,
                        sender: task.name,
                        senderImg: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                        adminId: null,
                        text: task.msg,
                        image: null,
                        timestamp: Date.now()
                    });

                    statusMsg.style.color = "#a5f3bc";
                    statusMsg.innerText = `✅ تم إرسال رسالة "${task.name}" بنجاح.`;

                    // إذا لم تكن هذه هي الرسالة الأخيرة، قم بالانتظار 30 ثانية
                    if (i < tasks.length - 1) {
                        for(let sec = 30; sec > 0; sec--) {
                            statusMsg.style.color = "#fca311";
                            statusMsg.innerText = `⏳ جاري انتظار ${sec} ثانية لإرسال رسالة "${tasks[i+1].name}"...`;
                            await sleep(1000);
                        }
                    }
                }

                // نهاية جميع الرسائل
                statusMsg.style.color = "#a5f3bc";
                statusMsg.innerText = "🎉 تم الانتهاء من إرسال جميع الرسائل بنجاح!";
                
            } catch (error) {
                console.error("خطأ:", error);
                statusMsg.style.color = "#ff4d4d";
                statusMsg.innerText = "❌ حدث خطأ في الاتصال بقاعدة البيانات.";
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = "🚀 بدء إرسال الجميع";
            }
        }

        // إضافة حقل واحد افتراضياً عند فتح الصفحة
        window.onload = () => {
            addAccountRow();
        };
    </script>
</body>
</html>
