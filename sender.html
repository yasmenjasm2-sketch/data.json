<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإرسال الخاص للإدارة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        body {
            background-color: #0b0714;
            color: #ffffff;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .panel-container {
            background: rgba(20, 15, 30, 0.9);
            border: 1px solid #8e44ad;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(142, 68, 173, 0.3);
            margin-top: 20px;
        }

        h2 {
            text-align: center;
            color: #d6b4fc;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(187, 134, 252, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #a0a0b0;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .account-row {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(187, 134, 252, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #bb86fc;
            font-weight: bold;
        }

        .remove-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Tajawal', sans-serif;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid rgba(187, 134, 252, 0.3);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        .input-admin-id {
            border-color: #f39c12 !important;
            color: #f39c12 !important;
        }

        input:focus, textarea:focus {
            border-color: #bb86fc;
            box-shadow: 0 0 10px rgba(187, 134, 252, 0.3);
        }
        
        .input-admin-id:focus {
            border-color: #f39c12;
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        .btn-add {
            width: 100%;
            background: transparent;
            color: #bb86fc;
            border: 2px dashed #bb86fc;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-add:hover {
            background: rgba(187, 134, 252, 0.1);
        }

        .btn-send {
            width: 100%;
            background: linear-gradient(90deg, #8e44ad, #2980b9);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(142, 68, 173, 0.6);
        }

        .btn-send:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 15px;
            font-weight: bold;
            color: #fca311;
            display: none;
            padding: 10px;
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="panel-container">
        <h2>📩 إرسال خاص للأدمنية</h2>
        <div class="subtitle">يتم الإرسال لصندوق الخاص للأدمن المحدد بفاصل 30 ثانية</div>
        
        <div id="accountsContainer">
            </div>

        <button class="btn-add" id="addBtn" onclick="addAccountRow()">+ إضافة حساب ورسالة أخرى</button>
        <button class="btn-send" id="sendBtn" onclick="startSending()">🚀 بدء الإرسال للخاص</button>
        
        <div id="statusMsg" class="status"></div>
    </div>

    <script>
        // إعدادات فايربيس الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyD3eRFHDhOtKlli3KA8vUyE1--C5F47UYw",
            databaseURL: "https://chatapi-1ca71-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chatapi-1ca71",
            storageBucket: "chatapi-1ca71.firebasestorage.app",
            appId: "1:1057989927219:android:b3e3b7304228b526b21e46"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let rowCount = 0;
        const maxRows = 10;

        // دالة لإنشاء آيدي يشبه آيدي أجهزة الأندرويد الحقيقية
        function generateRealDeviceId() {
            const chars = '0123456789abcdef';
            let id = '';
            for (let i = 0; i < 16; i++) {
                id += chars[Math.floor(Math.random() * chars.length)];
            }
            return id;
        }

        // دالة للحصول على آيدي ثابت لنفس الاسم لعدم تكرار الحسابات نهائياً
        // الحساب يُصنع فقط عندما تكتبه هنا
        function getPersistentIdForName(name) {
            let savedIds = JSON.parse(localStorage.getItem('private_sender_ids')) || {};
            if (savedIds[name]) {
                return savedIds[name];
            } else {
                let newId = generateRealDeviceId();
                savedIds[name] = newId;
                localStorage.setItem('private_sender_ids', JSON.stringify(savedIds));
                return newId;
            }
        }

        // دالة لإضافة حقل اسم ورسالة جديد
        function addAccountRow() {
            if (rowCount >= maxRows) {
                alert("الحد الأقصى هو 10 حسابات في المرة الواحدة!");
                return;
            }

            rowCount++;
            const container = document.getElementById('accountsContainer');
            
            const rowDiv = document.createElement('div');
            rowDiv.className = 'account-row';
            rowDiv.id = `row-${rowCount}`;
            
            // تمت إضافة حقل مخصص لآيدي الأدمن
            rowDiv.innerHTML = `
                <div class="account-header">
                    <span>الرسالة رقم ${rowCount}</span>
                    <button class="remove-btn" onclick="removeRow('row-${rowCount}')">حذف</button>
                </div>
                <input type="text" class="input-name" placeholder="اسم المستخدم الوهمي المرسل (مثال: سارة)" required>
                <input type="text" class="input-admin-id" placeholder="آيدي الأدمن المستلم (مثال: 1111 أو 2222)" required>
                <textarea class="input-msg" placeholder="اكتب الرسالة التي ستصل لخاص الأدمن..." required></textarea>
            `;
            
            container.appendChild(rowDiv);
            
            if(rowCount >= maxRows) {
                document.getElementById('addBtn').style.display = 'none';
            }
        }

        function removeRow(rowId) {
            document.getElementById(rowId).remove();
            rowCount--;
            document.getElementById('addBtn').style.display = 'block';
            
            let rows = document.querySelectorAll('.account-row');
            rows.forEach((row, index) => {
                row.querySelector('.account-header span').innerText = `الرسالة رقم ${index + 1}`;
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function startSending() {
            let rows = document.querySelectorAll('.account-row');
            let tasks = [];

            // تجميع البيانات من جميع الحقول بما فيها آيدي الأدمن
            rows.forEach(row => {
                let name = row.querySelector('.input-name').value.trim();
                let adminId = row.querySelector('.input-admin-id').value.trim();
                let msg = row.querySelector('.input-msg').value.trim();
                
                if(name && msg && adminId) {
                    tasks.push({name: name, adminId: adminId, msg: msg});
                }
            });

            if (tasks.length === 0) {
                alert("يرجى تعبئة جميع الحقول (الاسم، آيدي الأدمن، والرسالة).");
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            sendBtn.disabled = true;
            statusMsg.style.display = "block";

            try {
                for (let i = 0; i < tasks.length; i++) {
                    let task = tasks[i];
                    
                    // استخراج آيدي ثابت للمرسل
                    let deviceId = getPersistentIdForName(task.name);
                    
                    // إنشاء حساب المستخدم في النظام ليظهر كحساب حقيقي
                    await db.ref('users/' + deviceId).update({
                        name: task.name,
                        image: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                        lastLogin: Date.now()
                    });

                    // المسار الدقيق لغرفة الخاص بين هذا المستخدم والأدمن المستهدف
                    let privateRoomPath = `private_messages/user_${deviceId}_admin_${task.adminId}`;

                    // إرسال الرسالة إلى مسار الخاص بدلاً من العام
                    await db.ref(privateRoomPath).push({
                        deviceId: deviceId,
                        sender: task.name,
                        senderImg: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                        adminId: null, // يظل null لأن المرسل مستخدم عادي وليس أدمن
                        text: task.msg,
                        image: null,
                        timestamp: Date.now()
                    });

                    statusMsg.style.color = "#a5f3bc";
                    statusMsg.innerText = `✅ تم إرسال رسالة من "${task.name}" إلى خاص الأدمن (${task.adminId}).`;

                    // نظام التأخير الإجباري 30 ثانية
                    if (i < tasks.length - 1) {
                        for(let sec = 30; sec > 0; sec--) {
                            statusMsg.style.color = "#fca311";
                            statusMsg.innerText = `⏳ انتظار ${sec} ثانية قبل مراسلة الأدمن (${tasks[i+1].adminId})...`;
                            await sleep(1000);
                        }
                    }
                }

                statusMsg.style.color = "#a5f3bc";
                statusMsg.innerText = "🎉 تمت عملية الإرسال للخاص بنجاح!";
                
            } catch (error) {
                console.error("خطأ:", error);
                statusMsg.style.color = "#ff4d4d";
                statusMsg.innerText = "❌ حدث خطأ في الاتصال بقاعدة البيانات.";
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = "🚀 بدء الإرسال للخاص";
            }
        }

        window.onload = () => {
            addAccountRow();
        };
    </script>
</body>
</html>
