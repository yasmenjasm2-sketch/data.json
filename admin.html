<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة المتقدمة - FawakihAI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b0714; color: #fff; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* شاشة تسجيل الدخول */
        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #0b0714; z-index: 100; position: absolute; width: 100%; top: 0; }
        .login-box { background: #1a1525; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #f39c12; box-shadow: 0 0 20px rgba(243, 156, 18, 0.2); width: 90%; max-width: 400px; }
        .login-box h2 { color: #f39c12; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; text-align: center; font-size: 18px; outline: none; }
        .login-box input:focus { border-color: #f39c12; }
        .login-box button { width: 100%; background: #f39c12; color: #000; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .login-box button:hover { background: #e67e22; }

        /* اللوحة الرئيسية */
        #dashboard { display: none; height: 100vh; flex-direction: column; }
        header { background: #1a1525; padding: 15px 20px; border-bottom: 2px solid #f39c12; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        header h1 { margin: 0; color: #f39c12; font-size: 24px; }
        
        .admin-settings { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .admin-settings input { padding: 8px 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; outline: none; font-size: 13px; }
        .admin-settings input:focus { border-color: #f39c12; }
        
        .logout-btn { background: #e74c3c; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .container { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }
        
        /* الأعمدة */
        .panel { background: #1a1525; border-radius: 15px; border: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; flex: 1; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .panel-header { background: #221c30; padding: 15px; font-weight: bold; color: #f39c12; border-bottom: 1px solid #333; text-align: center; font-size: 18px; }
        .panel-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* التمرير */
        .panel-content::-webkit-scrollbar { width: 6px; }
        .panel-content::-webkit-scrollbar-thumb { background: #f39c12; border-radius: 10px; }

        /* العناصر */
        .card { background: #2a233c; padding: 15px; border-radius: 10px; border: 1px solid #444; position: relative; }
        
        /* المستخدمين */
        .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .user-header img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #f39c12; }
        .user-info h4 { margin: 0 0 5px 0; color: #fff; font-size: 16px; }
        .device-id { font-size: 11px; color: #aaa; background: #111; padding: 3px 8px; border-radius: 5px; font-family: monospace; }
        .badges { display: flex; gap: 5px; margin-top: 5px; }
        .badge { font-size: 10px; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
        .badge.admin { background: #3498db; color: white; }
        .badge.banned { background: #e74c3c; color: white; }

        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
        button.action-btn { flex: 1; min-width: 100px; padding: 8px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; transition: 0.2s; color: white; }
        .btn-ban { background: #e74c3c; } .btn-ban:hover { background: #c0392b; }
        .btn-unban { background: #2ecc71; } .btn-unban:hover { background: #27ae60; }
        .btn-promote { background: #3498db; } .btn-promote:hover { background: #2980b9; }
        .btn-demote { background: #95a5a6; } .btn-demote:hover { background: #7f8c8d; }
        .btn-view { background: #9b59b6; } .btn-view:hover { background: #8e44ad; }

        /* الرسائل */
        .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 8px; }
        .msg-sender { color: #f39c12; font-weight: bold; }
        .msg-time { font-size: 11px; color: #888; }
        .msg-text { font-size: 14px; line-height: 1.5; margin-bottom: 10px; }
        .msg-image { max-width: 150px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        
        .msg-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .btn-reply { background: #2ecc71; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }

        /* نافذة شات المستخدم المنفرد (Modal) */
        #user-chat-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #1a1525; width: 90%; max-width: 600px; height: 80vh; border-radius: 15px; border: 1px solid #f39c12; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 15px; background: #221c30; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        .modal-header h3 { margin: 0; color: #f39c12; font-size: 16px;}
        .modal-header-actions { display: flex; gap: 8px; }
        .modal-ban-btn { padding: 5px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .close-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        #modal-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .reply-box { padding: 15px; background: #221c30; border-top: 1px solid #444; display: flex; gap: 10px; }
        .reply-box input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; outline: none; }
        .reply-box button { background: #f39c12; color: black; font-weight: bold; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            header { flex-direction: column; align-items: flex-start; }
            .admin-settings { width: 100%; }
            .admin-settings input { flex: 1; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>لوحة الإدارة السرية</h2>
        <input type="password" id="admin-pass" placeholder="أدخل كلمة المرور" onkeypress="if(event.key === 'Enter') checkLogin()">
        <button onclick="checkLogin()">تسجيل الدخول</button>
        <p id="login-error" style="color: #e74c3c; display: none; margin-top: 10px; font-size: 14px;">كلمة المرور غير صحيحة!</p>
    </div>
</div>

<div id="dashboard">
    <header>
        <h1>🛠️ لوحة تحكم السوبر آدمن</h1>
        <div class="admin-settings">
            <input type="text" id="custom-admin-name" placeholder="اسمك كأدمن (مثال: المدير حمزة)" onchange="saveAdminConfig()">
            <input type="text" id="custom-admin-img" placeholder="رابط صورة الأدمن" onchange="saveAdminConfig()">
            <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
        </div>
    </header>

    <div class="container">
        <div class="panel">
            <div class="panel-header">👥 إدارة المستخدمين</div>
            <div class="panel-content" id="users-list"></div>
        </div>

        <div class="panel">
            <div class="panel-header">💬 المراقبة العامة للرسائل</div>
            <div class="panel-content" id="messages-list"></div>
        </div>
    </div>
</div>

<div id="user-chat-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title">دردشة المستخدم</h3>
            <div class="modal-header-actions">
                <button id="modal-ban-action" class="modal-ban-btn" onclick="toggleModalBan()">حظر 🚫</button>
                <button class="close-btn" onclick="closeUserChat()">إغلاق ✕</button>
            </div>
        </div>
        <div id="modal-messages"></div>
        <div class="reply-box">
            <input type="text" id="admin-reply-input" placeholder="اكتب ردك المباشر للمستخدم..." onkeypress="if(event.key === 'Enter') sendDirectReply()">
            <button onclick="sendDirectReply()">إرسال الرد</button>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyD3eRFHDhOtKlli3KA8vUyE1--C5F47UYw",
        databaseURL: "https://chatapi-1ca71-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "chatapi-1ca71"
    };
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // متغيرات النظام
    let globalUsers = {};
    let globalAdmins = {};
    let globalBans = {};
    let currentChatUserId = null;
    let currentChatUserName = null;

    // --- نظام تسجيل الدخول ---
    const ADMIN_PASSWORD = "gmail34567";

    window.onload = () => {
        const savedPass = localStorage.getItem("admin_auth_pass");
        if (savedPass === ADMIN_PASSWORD) {
            grantAccess();
        }
        loadAdminConfig();
    };

    function checkLogin() {
        const pass = document.getElementById("admin-pass").value;
        if (pass === ADMIN_PASSWORD) {
            localStorage.setItem("admin_auth_pass", pass);
            grantAccess();
        } else {
            document.getElementById("login-error").style.display = "block";
        }
    }

    function logout() {
        localStorage.removeItem("admin_auth_pass");
        location.reload();
    }

    function grantAccess() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("dashboard").style.display = "flex";
        initDashboard();
    }

    // حفظ واسترجاع بيانات الأدمن المخصصة
    function saveAdminConfig() {
        localStorage.setItem("super_admin_name", document.getElementById("custom-admin-name").value);
        localStorage.setItem("super_admin_img", document.getElementById("custom-admin-img").value);
    }

    function loadAdminConfig() {
        document.getElementById("custom-admin-name").value = localStorage.getItem("super_admin_name") || "";
        document.getElementById("custom-admin-img").value = localStorage.getItem("super_admin_img") || "";
    }

    // --- تشغيل البيانات ---
    function initDashboard() {
        db.ref('admins').on('value', snap => {
            globalAdmins = snap.val() || {};
            renderUsers();
        });

        db.ref('bans').on('value', snap => {
            globalBans = snap.val() || {};
            renderUsers();
            updateModalBanButton(); // تحديث زر الحظر في الشات إذا كان مفتوحاً
        });

        db.ref('users').on('value', snap => {
            globalUsers = snap.val() || {};
            renderUsers();
        });

        loadAllMessages();
    }

    // --- رسم قائمة المستخدمين ---
    function renderUsers() {
        const list = document.getElementById("users-list");
        list.innerHTML = "";

        for (const [uid, data] of Object.entries(globalUsers)) {
            const isAdmin = globalAdmins[uid] ? true : false;
            const isBanned = globalBans[uid] ? true : false;

            let badgesHTML = "";
            if (isAdmin) badgesHTML += `<span class="badge admin">آدمن</span>`;
            if (isBanned) badgesHTML += `<span class="badge banned">محظور</span>`;

            let adminBtn = isAdmin 
                ? `<button class="action-btn btn-demote" onclick="demoteAdmin('${uid}')">تنزيل أدمن ▼</button>`
                : `<button class="action-btn btn-promote" onclick="promoteAdmin('${uid}')">رفع أدمن ▲</button>`;

            let banBtn = isBanned
                ? `<button class="action-btn btn-unban" onclick="unbanUser('${uid}')">فك الحظر 🔓</button>`
                : `<button class="action-btn btn-ban" onclick="banUser('${uid}')">حظر الجهاز 🚫</button>`;

            list.innerHTML += `
                <div class="card">
                    <div class="user-header">
                        <img src="${data.image || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" alt="صورة">
                        <div class="user-info">
                            <h4>${data.name}</h4>
                            <div class="device-id">${uid}</div>
                            <div class="badges">${badgesHTML}</div>
                        </div>
                    </div>
                    <div class="btn-group">
                        ${adminBtn}
                        ${banBtn}
                        <button class="action-btn btn-view" onclick="openUserChat('${uid}', '${data.name}')">الدردشة والتحكم 👁️</button>
                    </div>
                </div>
            `;
        }
    }

    function promoteAdmin(uid) { if(confirm("تأكيد رفع هذا المستخدم لمنصب أدمن؟")) db.ref('admins/' + uid).set({ role: 'admin' }); }
    function demoteAdmin(uid) { if(confirm("تأكيد تنزيل هذا المستخدم من الإدارة؟")) db.ref('admins/' + uid).remove(); }
    function banUser(uid) { db.ref('bans/' + uid).set(true); }
    function unbanUser(uid) { db.ref('bans/' + uid).remove(); }

    // --- نظام الرسائل العام ---
    function loadAllMessages() {
        const msgList = document.getElementById("messages-list");
        
        db.ref('messages').on('child_added', snapshot => {
            const key = snapshot.key;
            const data = snapshot.val();
            const time = new Date(data.timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

            // تمييز إذا كانت الرسالة من سوبر أدمن في اللوحة
            const senderName = data.isSuperAdmin ? `<span style="color: #f1c40f;">👑 ${data.sender}</span>` : data.sender;

            let msgHtml = `
                <div class="card" id="msg-${key}">
                    <div class="msg-header">
                        <span class="msg-sender">${senderName}</span>
                        <span class="msg-time">${time}</span>
                    </div>
                    <div class="device-id" style="margin-bottom:8px;">${data.deviceId}</div>
            `;

            if (data.text) msgHtml += `<div class="msg-text">${data.text}</div>`;
            if (data.image) msgHtml += `<img src="${data.image}" class="msg-image" onclick="window.open('${data.image}')">`;

            msgHtml += `
                    <div class="msg-actions">
                        <button class="btn-reply" onclick="openUserChat('${data.deviceId === 'admin_system' ? data.targetId : data.deviceId}', '${data.sender}')">إجراء ورد</button>
                        <button class="btn-delete" onclick="deleteMessage('${key}')">مسح رسالة 🗑️</button>
                    </div>
                </div>
            `;
            
            msgList.insertAdjacentHTML('afterbegin', msgHtml);

            if(currentChatUserId === data.deviceId || (data.isAdminReply && data.targetId === currentChatUserId)) {
                appendMsgToModal(key, data, time);
            }
        });

        db.ref('messages').on('child_removed', snapshot => {
            const el = document.getElementById("msg-" + snapshot.key);
            if (el) el.remove();
            const modalEl = document.getElementById("modal-msg-" + snapshot.key);
            if (modalEl) modalEl.remove();
        });
    }

    function deleteMessage(key) {
        if(confirm("هل أنت متأكد من مسح هذه الرسالة للجميع؟")) {
            db.ref('messages/' + key).remove();
        }
    }

    // --- نظام الشات المنفرد والرد والحظر ---
    function openUserChat(uid, userName) {
        currentChatUserId = uid;
        currentChatUserName = userName;
        document.getElementById("modal-title").innerText = `إدارة المستخدم: ${userName}`;
        document.getElementById("modal-messages").innerHTML = ""; 
        document.getElementById("user-chat-modal").style.display = "flex";
        
        updateModalBanButton(); // تحديث حالة الزر فور الفتح

        db.ref('messages').once('value', snapshot => {
            snapshot.forEach(child => {
                const data = child.val();
                if (data.deviceId === uid || (data.isAdminReply && data.targetId === uid)) {
                    const time = new Date(data.timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                    appendMsgToModal(child.key, data, time);
                }
            });
            const modalMsgs = document.getElementById("modal-messages");
            modalMsgs.scrollTop = modalMsgs.scrollHeight;
        });
    }

    function closeUserChat() {
        document.getElementById("user-chat-modal").style.display = "none";
        currentChatUserId = null;
    }

    function toggleModalBan() {
        if (!currentChatUserId) return;
        if (globalBans[currentChatUserId]) {
            unbanUser(currentChatUserId);
        } else {
            banUser(currentChatUserId);
        }
    }

    function updateModalBanButton() {
        if (!currentChatUserId) return;
        const btn = document.getElementById("modal-ban-action");
        if (globalBans[currentChatUserId]) {
            btn.innerText = "فك الحظر 🔓";
            btn.style.background = "#2ecc71";
        } else {
            btn.innerText = "حظر من الشات 🚫";
            btn.style.background = "#e74c3c";
        }
    }

    function appendMsgToModal(key, data, time) {
        const modalMsgs = document.getElementById("modal-messages");
        const isReply = data.isAdminReply;
        
        let html = `
            <div class="card" id="modal-msg-${key}" style="background: ${isReply ? '#27ae6033' : '#2a233c'}; border-color: ${isReply ? '#2ecc71' : '#444'};">
                <div class="msg-header">
                    <span class="msg-sender" style="color: ${isReply ? '#f1c40f' : '#f39c12'};">${data.sender}</span>
                    <span class="msg-time">${time}</span>
                </div>
                ${data.text ? `<div class="msg-text">${data.text}</div>` : ''}
                ${data.image ? `<img src="${data.image}" class="msg-image">` : ''}
                <div class="msg-actions">
                    <button class="btn-delete" onclick="deleteMessage('${key}')">مسح 🗑️</button>
                </div>
            </div>
        `;
        modalMsgs.innerHTML += html;
        modalMsgs.scrollTop = modalMsgs.scrollHeight;
    }

    function sendDirectReply() {
        const input = document.getElementById("admin-reply-input");
        const text = input.value.trim();
        if (!text || !currentChatUserId) return;

        // سحب البيانات المخصصة للأدمن
        const customName = document.getElementById("custom-admin-name").value.trim() || "الإدارة المركزية";
        const customImg = document.getElementById("custom-admin-img").value.trim() || "https://cdn-icons-png.flaticon.com/512/6024/6024190.png";

        const msgData = {
            deviceId: "admin_system", 
            sender: customName,
            senderImg: customImg,
            text: "🔹 رد على " + currentChatUserName + ":\n" + text,
            timestamp: Date.now(),
            isAdminReply: true,
            targetId: currentChatUserId, // معرف المستخدم المستهدف لإظهار الشعار له
            isSuperAdmin: true // لتمييزه بشارة السوبر أدمن
        };

        db.ref('messages').push(msgData);
        input.value = "";
    }
</script>

</body>
</html>
