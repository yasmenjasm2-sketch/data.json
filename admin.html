<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - الشات</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d0d0d; color: #fff; margin: 0; padding: 20px; }
        h1 { color: #f39c12; border-bottom: 2px solid #f39c12; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .panel { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        ul { list-style: none; padding: 0; margin: 0; max-height: 400px; overflow-y: auto; }
        li { background: #262626; margin-bottom: 10px; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; flex-direction: column; gap: 5px; }
        .device-id { font-size: 12px; color: #f39c12; }
        button { border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-ban { background: #e74c3c; color: white; }
        .btn-admin { background: #3498db; color: white; margin-right: 5px; }
        img { max-width: 100px; border-radius: 5px; margin-top: 10px; }
        
        #access-denied { text-align: center; color: red; margin-top: 100px; font-size: 24px; }
        #dashboard { display: none; }
    </style>
</head>
<body>

<div id="access-denied">جاري التحقق من الصلاحيات...</div>

<div id="dashboard">
    <h1>لوحة تحكم السوبر آدمن</h1>
    <div class="grid">
        <div class="panel">
            <h3>قائمة المستخدمين</h3>
            <ul id="users-list"></ul>
        </div>
        <div class="panel">
            <h3>مراقبة الرسائل</h3>
            <ul id="messages-list"></ul>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD3eRFHDhOtKlli3KA8vUyE1--C5F47UYw",
        databaseURL: "https://chatapi-1ca71-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "chatapi-1ca71"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // التحقق من الصلاحيات عبر نفس معرف الجهاز
    let deviceId = localStorage.getItem("chat_device_id");
    
    // إجبار النظام على جعل أول من يفتح الصفحة هو السوبر آدمن (لأول مرة فقط)
    db.ref('admins').once('value', snapshot => {
        if (!snapshot.exists()) {
            db.ref('admins/' + deviceId).set({ role: 'superadmin' });
            grantAccess();
        } else {
            if (snapshot.hasChild(deviceId)) {
                grantAccess();
            } else {
                document.getElementById("access-denied").innerText = "ليس لديك صلاحية لدخول لوحة التحكم. الـ Device ID الخاص بك: " + deviceId;
            }
        }
    });

    function grantAccess() {
        document.getElementById("access-denied").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadUsers();
        loadMessages();
    }

    function loadUsers() {
        db.ref('users').on('value', snapshot => {
            const usersList = document.getElementById("users-list");
            usersList.innerHTML = "";
            snapshot.forEach(child => {
                const uid = child.key;
                const data = child.val();
                usersList.innerHTML += `
                    <li>
                        <div class="user-info">
                            <strong>${data.name}</strong>
                            <span class="device-id">ID: ${uid}</span>
                        </div>
                        <div>
                            <button class="btn-ban" onclick="banUser('${uid}')">حظر الجهاز</button>
                            <button class="btn-admin" onclick="makeAdmin('${uid}')">تعيين كأدمن</button>
                        </div>
                    </li>
                `;
            });
        });
    }

    function loadMessages() {
        db.ref('messages').on('child_added', snapshot => {
            const data = snapshot.val();
            const time = new Date(data.timestamp).toLocaleTimeString();
            let msgContent = data.text ? `<p>${data.text}</p>` : "";
            if (data.image) msgContent += `<img src="${data.image}">`;
            
            document.getElementById("messages-list").innerHTML += `
                <li style="flex-direction: column; align-items: flex-start;">
                    <div style="width: 100%; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 5px;">
                        <span style="color:#f39c12;">${data.sender}</span> 
                        <span style="font-size:10px; color:#aaa;">(${time})</span>
                        <div class="device-id">ID: ${data.deviceId}</div>
                    </div>
                    ${msgContent}
                </li>
            `;
        });
    }

    function banUser(uid) {
        if(confirm("هل أنت متأكد من حظر هذا الجهاز نهائياً؟")) {
            db.ref('bans/' + uid).set(true);
            alert("تم الحظر بنجاح.");
        }
    }

    function makeAdmin(uid) {
        if(confirm("هل تريد تعيين هذا الجهاز كأدمن؟")) {
            db.ref('admins/' + uid).set({ role: 'admin' });
            alert("تم التعيين كأدمن.");
        }
    }
</script>

</body>
</html>
