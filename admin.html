<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة المتقدمة - FawakihAI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b0714; color: #fff; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* شاشة تسجيل الدخول */
        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #0b0714; z-index: 100; position: absolute; width: 100%; top: 0; }
        .login-box { background: #1a1525; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #f39c12; box-shadow: 0 0 20px rgba(243, 156, 18, 0.2); width: 90%; max-width: 400px; }
        .login-box h2 { color: #f39c12; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; text-align: center; font-size: 18px; outline: none; }
        .login-box input:focus { border-color: #f39c12; }
        .login-box button { width: 100%; background: #f39c12; color: #000; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .login-box button:hover { background: #e67e22; }

        /* اللوحة الرئيسية */
        #dashboard { display: none; height: 100vh; flex-direction: column; }
        header { background: #1a1525; padding: 15px 20px; border-bottom: 2px solid #f39c12; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        header h1 { margin: 0; color: #f39c12; font-size: 24px; display: flex; align-items: center; gap: 10px; }
        #admin-id-display { background: rgba(243, 156, 18, 0.2); color: #f39c12; font-size: 14px; padding: 4px 10px; border-radius: 8px; border: 1px solid #f39c12; }
        
        .admin-settings { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .admin-settings input[type="text"] { padding: 8px 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; outline: none; font-size: 13px; }
        .admin-settings input[type="text"]:focus { border-color: #f39c12; }
        
        /* زر رفع الصورة وزر الخاص الجديد */
        .file-upload-btn { padding: 8px 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; cursor: pointer; font-size: 13px; display: inline-block; transition: 0.3s; }
        .file-upload-btn:hover { border-color: #f39c12; background: #333; }
        
        .private-box-btn { background: #8e44ad; color: white; border-color: #9b59b6; font-weight: bold; }
        .private-box-btn:hover { background: #9b59b6; border-color: #fff; }

        .logout-btn { background: #e74c3c; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .container { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }
        
        /* الأعمدة */
        .panel { background: #1a1525; border-radius: 15px; border: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; flex: 1; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .panel-header { background: #221c30; padding: 15px; font-weight: bold; color: #f39c12; border-bottom: 1px solid #333; text-align: center; font-size: 18px; }
        .panel-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* التمرير */
        .panel-content::-webkit-scrollbar, #modal-messages::-webkit-scrollbar, #private-modal-list::-webkit-scrollbar { width: 6px; }
        .panel-content::-webkit-scrollbar-thumb, #modal-messages::-webkit-scrollbar-thumb, #private-modal-list::-webkit-scrollbar-thumb { background: #f39c12; border-radius: 10px; }

        /* العناصر */
        .card { background: #2a233c; padding: 15px; border-radius: 10px; border: 1px solid #444; position: relative; }
        
        /* المستخدمين */
        .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .user-header img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #f39c12; }
        .user-info h4 { margin: 0 0 5px 0; color: #fff; font-size: 16px; }
        .device-id { font-size: 11px; color: #aaa; background: #111; padding: 3px 8px; border-radius: 5px; font-family: monospace; }
        .badges { display: flex; gap: 5px; margin-top: 5px; }
        .badge { font-size: 10px; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
        .badge.admin { background: #3498db; color: white; }
        .badge.banned { background: #e74c3c; color: white; }

        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
        button.action-btn { flex: 1; min-width: 100px; padding: 8px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; transition: 0.2s; color: white; }
        .btn-ban { background: #e74c3c; } .btn-ban:hover { background: #c0392b; }
        .btn-unban { background: #2ecc71; } .btn-unban:hover { background: #27ae60; }
        .btn-promote { background: #3498db; } .btn-promote:hover { background: #2980b9; }
        .btn-demote { background: #95a5a6; } .btn-demote:hover { background: #7f8c8d; }
        .btn-view { background: #9b59b6; } .btn-view:hover { background: #8e44ad; }

        /* الرسائل */
        .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 8px; }
        .msg-sender { color: #f39c12; font-weight: bold; }
        .msg-time { font-size: 11px; color: #888; }
        .msg-text { font-size: 14px; line-height: 1.5; margin-bottom: 10px; }
        .msg-image { max-width: 150px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        
        .msg-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .btn-reply { color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; transition: 0.3s; }

        /* نوافذ الشات المنسدلة (Modals) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #1a1525; width: 90%; max-width: 600px; height: 80vh; border-radius: 15px; border: 1px solid #f39c12; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .modal-header { padding: 15px; background: #221c30; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        .modal-header h3 { margin: 0; color: #f39c12; font-size: 16px;}
        .modal-header-actions { display: flex; gap: 8px; }
        .modal-ban-btn { padding: 5px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .close-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        
        #modal-messages, #private-modal-list { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .reply-box { padding: 15px; background: #221c30; border-top: 1px solid #444; display: flex; gap: 10px; }
        .reply-box input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; outline: none; }
        .reply-box button { background: #f39c12; color: black; font-weight: bold; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            header { flex-direction: column; align-items: flex-start; }
            .admin-settings { width: 100%; }
            .admin-settings input[type="text"] { flex: 1; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>لوحة الإدارة السرية</h2>
        <input type="password" id="admin-pass" placeholder="أدخل كلمة المرور" onkeypress="if(event.key === 'Enter') checkLogin()">
        <button onclick="checkLogin()">تسجيل الدخول</button>
        <p id="login-error" style="color: #e74c3c; display: none; margin-top: 10px; font-size: 14px;">كلمة المرور غير صحيحة!</p>
    </div>
</div>

<div id="dashboard">
    <header>
        <h1>🛠️ لوحة تحكم السوبر آدمن <span id="admin-id-display"></span></h1>
        <div class="admin-settings">
            <button class="file-upload-btn private-box-btn" onclick="openPrivateMessagesModal()">صندوق الخاص 📩</button>
            <input type="text" id="custom-admin-name" placeholder="اسمك كأدمن (مثال: المدير حمزة)" onchange="saveAdminName()">
            <label for="custom-admin-img" class="file-upload-btn">تحديد صورتك 🖼️</label>
            <input type="file" id="custom-admin-img" accept="image/*" style="display:none;" onchange="saveAdminImage(event)">
            <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
        </div>
    </header>

    <div class="container">
        <div class="panel">
            <div class="panel-header">👥 إدارة المستخدمين</div>
            <div class="panel-content" id="users-list"></div>
        </div>

        <div class="panel">
            <div class="panel-header">💬 المراقبة العامة للرسائل</div>
            <div class="panel-content" id="messages-list"></div>
            <div class="reply-box">
                <input type="text" id="admin-general-input" placeholder="اكتب رسالتك لترسل في الشات العام..." onkeypress="if(event.key === 'Enter') sendGeneralReply()">
                <button onclick="sendGeneralReply()">إرسال للعام</button>
            </div>
        </div>
    </div>
</div>

<div id="user-chat-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title">الدردشة الخاصة مع المستخدم</h3>
            <div class="modal-header-actions">
                <button id="modal-ban-action" class="modal-ban-btn" onclick="toggleModalBan()">حظر 🚫</button>
                <button class="close-btn" onclick="closeUserChat()">إغلاق ✕</button>
            </div>
        </div>
        <div id="modal-messages"></div>
        <div class="reply-box">
            <input type="text" id="admin-reply-input" placeholder="اكتب ردك الخاص والسري للمستخدم..." onkeypress="if(event.key === 'Enter') sendDirectReply()">
            <button onclick="sendDirectReply()">إرسال بالخاص</button>
        </div>
    </div>
</div>

<div id="private-messages-modal" class="modal-overlay">
    <div class="modal-content" style="border-color: #8e44ad;">
        <div class="modal-header" style="border-bottom-color: #8e44ad;">
            <h3 style="color: #9b59b6;">📩 صندوق الرسائل الخاصة بك</h3>
            <button class="close-btn" style="background: #e74c3c;" onclick="closePrivateMessagesModal()">إغلاق ✕</button>
        </div>
        <div id="private-modal-list"></div>
    </div>
</div>

<script>
    const _p = atob("Z21haWwzNDU2Nw=="); 
    const firebaseConfig = {
        apiKey: atob("QUl6YVN5RDNlUkZIRGhPdEtsbGkzS0E4dlV5RTEtLUM1RjQ3VVl3"),
        databaseURL: atob("aHR0cHM6Ly9jaGF0YXBpLTFjYTcxLWRlZmF1bHQtcnRkYi5ldXJvcGUtd2VzdDEuZmlyZWJhc2VkYXRhYmFzZS5hcHA="),
        projectId: atob("Y2hhdGFwaS0xY2E3MQ==")
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    let globalUsers = {};
    let globalAdmins = {};
    let globalBans = {};
    let currentChatUserId = null;
    let currentChatUserName = null;

    const ADMIN_PASSWORD = _p;

    // --- نظام الحفظ المعزز والمزدوج لمنع فقدان الدخول ---
    function setPermanentLogin(pass) {
        localStorage.setItem("admin_auth_pass", pass);
        let d = new Date();
        d.setTime(d.getTime() + (10*365*24*60*60*1000));
        document.cookie = "admin_auth_pass=" + pass + ";expires=" + d.toUTCString() + ";path=/";
    }

    function getPermanentLogin() {
        let pass = localStorage.getItem("admin_auth_pass");
        if (pass) return pass;
        
        let name = "admin_auth_pass=";
        let decodedCookie = decodeURIComponent(document.cookie);
        let ca = decodedCookie.split(';');
        for(let i = 0; i <ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0) == ' ') { c = c.substring(1); }
            if (c.indexOf(name) == 0) { 
                let cookiePass = c.substring(name.length, c.length);
                localStorage.setItem("admin_auth_pass", cookiePass);
                return cookiePass;
            }
        }
        return null;
    }

    window.onload = () => {
        const savedPass = getPermanentLogin();
        if (savedPass === ADMIN_PASSWORD) {
            grantAccess();
        }
    };

    function checkLogin() {
        const pass = document.getElementById("admin-pass").value;
        if (pass === ADMIN_PASSWORD) {
            setPermanentLogin(pass);
            grantAccess();
        } else {
            document.getElementById("login-error").style.display = "block";
        }
    }

    function logout() {
        localStorage.removeItem("admin_auth_pass");
        document.cookie = "admin_auth_pass=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        location.reload();
    }

    function grantAccess() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("dashboard").style.display = "flex";
        loadAdminConfig();
        initDashboard();
    }

    // --- مزامنة وربط ملفات السوبر أدمن بالتطبيق ---
    function syncAdminProfile() {
        let myAdminId = localStorage.getItem("super_admin_id");
        let myDeviceId = localStorage.getItem("chat_device_id");
        
        if (!myAdminId) {
            const possibleIDs = ["1111", "2222", "3333", "4444", "5555", "7777", "8888", "9999"];
            myAdminId = possibleIDs[Math.floor(Math.random() * possibleIDs.length)];
            localStorage.setItem("super_admin_id", myAdminId);
        }
        
        if (!myDeviceId) {
            myDeviceId = 'admin_panel_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem("chat_device_id", myDeviceId);
        }

        document.getElementById("admin-id-display").innerText = "ID: " + myAdminId;

        const customName = localStorage.getItem("super_admin_name") || "الإدارة المركزية";
        const customImg = localStorage.getItem("super_admin_img") || "https://cdn-icons-png.flaticon.com/512/6024/6024190.png";

        db.ref('admins_list/' + myDeviceId).set(myAdminId);
        db.ref('admins_profiles/' + myAdminId).set({
            deviceId: myDeviceId,
            name: customName,
            image: customImg,
            id: myAdminId
        });
        db.ref('admins/' + myDeviceId).set({ role: 'admin' });
    }

    function saveAdminName() {
        localStorage.setItem("super_admin_name", document.getElementById("custom-admin-name").value);
        syncAdminProfile();
    }

    function saveAdminImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                localStorage.setItem("super_admin_img", base64Image); 
                syncAdminProfile();
                alert("تم حفظ صورتك بنجاح! سيتم استخدامها في رسائلك القادمة وتحديثها في الشات.");
            };
            reader.readAsDataURL(file);
        }
    }

    function loadAdminConfig() {
        document.getElementById("custom-admin-name").value = localStorage.getItem("super_admin_name") || "";
        syncAdminProfile();
    }

    function initDashboard() {
        db.ref('admins').on('value', snap => {
            globalAdmins = snap.val() || {};
            renderUsers();
        });

        db.ref('bans').on('value', snap => {
            globalBans = snap.val() || {};
            renderUsers();
            updateModalBanButton(); 
        });

        db.ref('users').on('value', snap => {
            globalUsers = snap.val() || {};
            renderUsers();
        });

        loadAllMessages();
    }

    function renderUsers() {
        const list = document.getElementById("users-list");
        list.innerHTML = "";

        for (const [uid, data] of Object.entries(globalUsers)) {
            const isAdmin = globalAdmins[uid] ? true : false;
            const isBanned = globalBans[uid] ? true : false;

            let badgesHTML = "";
            if (isAdmin) badgesHTML += `<span class="badge admin">آدمن</span>`;
            if (isBanned) badgesHTML += `<span class="badge banned">محظور</span>`;

            let adminBtn = isAdmin 
                ? `<button class="action-btn btn-demote" onclick="demoteAdmin('${uid}')">تنزيل أدمن ▼</button>`
                : `<button class="action-btn btn-promote" onclick="promoteAdmin('${uid}')">رفع أدمن ▲</button>`;

            let banBtn = isBanned
                ? `<button class="action-btn btn-unban" onclick="unbanUser('${uid}')">فك الحظر 🔓</button>`
                : `<button class="action-btn btn-ban" onclick="banUser('${uid}')">حظر الجهاز 🚫</button>`;

            list.innerHTML += `
                <div class="card">
                    <div class="user-header">
                        <img src="${data.image || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" alt="صورة">
                        <div class="user-info">
                            <h4>${data.name}</h4>
                            <div class="device-id">${uid}</div>
                            <div class="badges">${badgesHTML}</div>
                        </div>
                    </div>
                    <div class="btn-group">
                        ${adminBtn}
                        ${banBtn}
                        <button class="action-btn btn-view" onclick="openUserChat('${uid}', '${data.name}')">مراسلة خاص 📩</button>
                    </div>
                </div>
            `;
        }
    }

    function promoteAdmin(uid) { if(confirm("تأكيد رفع هذا المستخدم لمنصب أدمن؟")) db.ref('admins/' + uid).set({ role: 'admin' }); }
    function demoteAdmin(uid) { if(confirm("تأكيد تنزيل هذا المستخدم من الإدارة؟")) db.ref('admins/' + uid).remove(); }
    function banUser(uid) { db.ref('bans/' + uid).set(true); }
    function unbanUser(uid) { db.ref('bans/' + uid).remove(); }

    function loadAllMessages() {
        const msgList = document.getElementById("messages-list");
        msgList.innerHTML = "";
        
        // مراقبة الرسائل العامة (فقط) في الشاشة الرئيسية
        db.ref('messages_general').on('child_added', snapshot => {
            renderMessageToPanel(snapshot.key, snapshot.val(), false, 'messages_general/' + snapshot.key);
        });

        db.ref('messages_general').on('child_removed', snapshot => {
            removeMessageUI(snapshot.key);
        });
    }

    function renderMessageToPanel(key, data, isPrivate, fullPath) {
        const msgList = document.getElementById("messages-list");
        const time = new Date(data.timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

        const senderName = data.adminId ? `<span style="color: #f1c40f;">👑 ${data.sender}</span>` : data.sender;
        const privateBadge = isPrivate ? `<span style="background:#8e44ad; color:white; font-size:10px; padding:2px 5px; border-radius:4px; margin-right:5px;">🔒 خاص</span>` : '';

        let msgHtml = `
            <div class="card" id="msg-${key}">
                <div class="msg-header">
                    <span class="msg-sender">${privateBadge} ${senderName}</span>
                    <span class="msg-time">${time}</span>
                </div>
                <div class="device-id" style="margin-bottom:8px;">${data.deviceId}</div>
        `;

        if (data.text) msgHtml += `<div class="msg-text">${data.text}</div>`;
        if (data.image) msgHtml += `<img src="${data.image}" class="msg-image" onclick="window.open('${data.image}')">`;

        // تعديل الأزرار لضمان العزل التام
        msgHtml += `
                <div class="msg-actions">
                    <button class="btn-reply" style="background:#3498db;" onclick="prepareGeneralReply('${data.sender}')">رد بالعام</button>
                    <button class="btn-reply" style="background:#8e44ad;" onclick="openUserChat('${data.deviceId}', '${data.sender}')">خاص 📩</button>
                    <button class="btn-delete" onclick="deleteMessage('${fullPath}', '${key}')">مسح 🗑️</button>
                </div>
            </div>
        `;
        
        msgList.insertAdjacentHTML('afterbegin', msgHtml);
        
        // تم حذف كود النقل التلقائي لنافذة الخاص للعزل التام
    }

    function removeMessageUI(key) {
        const el = document.getElementById("msg-" + key);
        if (el) el.remove();
        const modalEl = document.getElementById("modal-msg-" + key);
        if (modalEl) modalEl.remove();
    }

    function deleteMessage(fullPath, key) {
        if(confirm("هل أنت متأكد من مسح هذه الرسالة؟")) {
            if (!fullPath.includes('/')) fullPath = 'messages_general/' + fullPath;
            db.ref(fullPath).remove();
        }
    }

    // دالة جديدة لتجهيز الرد في الشات العام
    function prepareGeneralReply(senderName) {
        const input = document.getElementById("admin-general-input");
        input.value = "@" + senderName + " ";
        input.focus();
    }

    // دالة جديدة لإرسال الرسائل للشات العام مباشرة (منعاً للخلط)
    function sendGeneralReply() {
        const input = document.getElementById("admin-general-input");
        const text = input.value.trim();
        if (!text) return;

        const customName = localStorage.getItem("super_admin_name") || "الإدارة المركزية";
        const customImg = localStorage.getItem("super_admin_img") || "https://cdn-icons-png.flaticon.com/512/6024/6024190.png";
        const myAdminId = localStorage.getItem("super_admin_id");
        const myDeviceId = localStorage.getItem("chat_device_id");

        const msgData = {
            deviceId: myDeviceId,
            adminId: myAdminId,
            sender: customName,
            senderImg: customImg,
            text: text,
            timestamp: Date.now()
        };

        db.ref('messages_general').push(msgData);
        input.value = "";
    }

    function openUserChat(uid, userName) {
        currentChatUserId = uid;
        currentChatUserName = userName;
        document.getElementById("modal-title").innerText = `رسائل الخاص مع: ${userName}`;
        const modalMsgs = document.getElementById("modal-messages");
        modalMsgs.innerHTML = ""; 
        document.getElementById("user-chat-modal").style.display = "flex";
        
        updateModalBanButton(); 

        // تم حذف كود جلب الرسائل العامة لتوفير عزل تام للخاص

        // جلب الرسائل الخاصة للمستخدم مع هذا الآدمن تحديداً (فقط)
        const myAdminId = localStorage.getItem("super_admin_id");
        const roomPath = `private_messages/user_${uid}_admin_${myAdminId}`;
        
        db.ref(roomPath).once('value', snapshot => {
            snapshot.forEach(child => {
                const data = child.val();
                const time = new Date(data.timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                appendMsgToModal(child.key, data, time, true, roomPath + '/' + child.key);
            });
            setTimeout(() => { modalMsgs.scrollTop = modalMsgs.scrollHeight; }, 200);
        });
    }

    function closeUserChat() {
        document.getElementById("user-chat-modal").style.display = "none";
        currentChatUserId = null;
    }

    function toggleModalBan() {
        if (!currentChatUserId) return;
        if (globalBans[currentChatUserId]) {
            unbanUser(currentChatUserId);
        } else {
            banUser(currentChatUserId);
        }
    }

    function updateModalBanButton() {
        if (!currentChatUserId) return;
        const btn = document.getElementById("modal-ban-action");
        if (globalBans[currentChatUserId]) {
            btn.innerText = "فك الحظر 🔓";
            btn.style.background = "#2ecc71";
        } else {
            btn.innerText = "حظر من الشات 🚫";
            btn.style.background = "#e74c3c";
        }
    }

    function appendMsgToModal(key, data, time, isPrivate, fullPath) {
        const modalMsgs = document.getElementById("modal-messages");
        const isReply = data.adminId && data.deviceId === localStorage.getItem("chat_device_id");
        const privateBadge = isPrivate ? `<span style="font-size:10px; color:#8e44ad; border:1px solid #8e44ad; padding:1px 4px; border-radius:3px; margin-right:5px;">خاص</span>` : '';
        
        let html = `
            <div class="card" id="modal-msg-${key}" style="background: ${isReply ? '#27ae6033' : '#2a233c'}; border-color: ${isReply ? '#2ecc71' : '#444'};">
                <div class="msg-header">
                    <span class="msg-sender" style="color: ${isReply ? '#f1c40f' : '#f39c12'};">${data.sender} ${privateBadge}</span>
                    <span class="msg-time">${time}</span>
                </div>
                ${data.text ? `<div class="msg-text">${data.text}</div>` : ''}
                ${data.image ? `<img src="${data.image}" class="msg-image">` : ''}
                <div class="msg-actions">
                    <button class="btn-delete" onclick="deleteMessage('${fullPath || 'messages_general/'+key}', '${key}')">مسح 🗑️</button>
                </div>
            </div>
        `;
        modalMsgs.innerHTML += html;
        modalMsgs.scrollTop = modalMsgs.scrollHeight;
    }

    function sendDirectReply() {
        const input = document.getElementById("admin-reply-input");
        const text = input.value.trim();
        if (!text || !currentChatUserId) return;

        const customName = localStorage.getItem("super_admin_name") || "الإدارة المركزية";
        const customImg = localStorage.getItem("super_admin_img") || "https://cdn-icons-png.flaticon.com/512/6024/6024190.png";
        const myAdminId = localStorage.getItem("super_admin_id");
        const myDeviceId = localStorage.getItem("chat_device_id");

        const msgData = {
            deviceId: myDeviceId, 
            adminId: myAdminId,
            sender: customName,
            senderImg: customImg,
            text: "👑 رسالة إدارية خاصة من [" + customName + "]\n\n" + text, 
            timestamp: Date.now(),
            isAdminReply: true,
            targetId: currentChatUserId, 
            isSuperAdmin: true,
            isPrivateMessage: true, 
            adminHeaderData: {
                title: "إدارة النظام",
                buttonLabel: customName,
                icon: customImg
            }
        };

        const roomPath = `private_messages/user_${currentChatUserId}_admin_${myAdminId}`;
        db.ref(roomPath).push(msgData);
        
        // تحديث واجهة المودال فوراً لتظهر الرسالة
        appendMsgToModal('temp_' + Date.now(), msgData, new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }), true, roomPath);
        
        input.value = "";
    }

    // --- الوظائف الخاصة بصندوق الخاص للآدمن المعزول ---
    function openPrivateMessagesModal() {
        const myAdminId = localStorage.getItem("super_admin_id");
        if (!myAdminId) {
            alert("لم يتم تحديد معرف الآدمن الخاص بك بعد.");
            return;
        }

        document.getElementById("private-messages-modal").style.display = "flex";
        const privateList = document.getElementById("private-modal-list");
        privateList.innerHTML = "<div style='text-align:center; color:#888; padding: 20px;'>جاري فحص الرسائل الخاصة...</div>";

        // استدعاء وعرض فقط الرسائل الخاصة الموجهة لهذا الآدمن
        db.ref('private_messages').on('value', snapshot => {
            privateList.innerHTML = ""; 
            let hasMessages = false;

            snapshot.forEach(roomSnapshot => {
                const roomKey = roomSnapshot.key;
                
                // هنا يتم العزل: جلب الغرف التي تخص هذا الآدمن فقط
                if (roomKey.endsWith('_admin_' + myAdminId)) {
                    roomSnapshot.forEach(msgSnapshot => {
                        const data = msgSnapshot.val();
                        const msgKey = msgSnapshot.key;
                        const fullPath = 'private_messages/' + roomKey + '/' + msgKey;
                        const time = new Date(data.timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                        
                        hasMessages = true;
                        
                        const isReply = data.adminId && data.deviceId === localStorage.getItem("chat_device_id");
                        const cardBg = isReply ? '#27ae6033' : '#2a233c';
                        const cardBorder = isReply ? '#2ecc71' : '#8e44ad';
                        const senderColor = isReply ? '#f1c40f' : '#f39c12';

                        let html = `
                            <div class="card" style="background: ${cardBg}; border-color: ${cardBorder}; border-width: 1px; border-style: solid;">
                                <div class="msg-header">
                                    <span class="msg-sender" style="color: ${senderColor};">🔒 ${data.sender}</span>
                                    <span class="msg-time">${time}</span>
                                </div>
                                <div class="device-id" style="margin-bottom:8px;">${data.deviceId}</div>
                                ${data.text ? `<div class="msg-text">${data.text}</div>` : ''}
                                ${data.image ? `<img src="${data.image}" class="msg-image" onclick="window.open('${data.image}')">` : ''}
                                <div class="msg-actions">
                                    <button class="btn-reply" style="background:#2ecc71;" onclick="replyFromPrivateModal('${data.deviceId}', '${data.sender}')">فتح الدردشة والرد</button>
                                    <button class="btn-delete" onclick="deleteMessage('${fullPath}', '${msgKey}')">مسح 🗑️</button>
                                </div>
                            </div>
                        `;
                        // إضافة الرسائل بحيث تكون الأحدث في الأسفل
                        privateList.insertAdjacentHTML('beforeend', html);
                    });
                }
            });

            if (!hasMessages) {
                privateList.innerHTML = "<div style='text-align:center; color:#888; padding: 30px;'>صندوق الخاص فارغ. لا توجد رسائل موجهة لك حالياً.</div>";
            } else {
                setTimeout(() => { privateList.scrollTop = privateList.scrollHeight; }, 100);
            }
        });
    }

    function closePrivateMessagesModal() {
        document.getElementById("private-messages-modal").style.display = "none";
        db.ref('private_messages').off('value'); // إيقاف الاستماع لتخفيف الأداء
    }

    function replyFromPrivateModal(uid, userName) {
        closePrivateMessagesModal();
        openUserChat(uid, userName);
    }
</script>

</body>
</html>
