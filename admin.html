<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم دعم FawakihAI</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #e94560; /* لون مميز للأدمن */
        --bg-dark: #121212;
        --panel-bg: #1a1a24;
        --border: #2d2d3a;
        --text: #fff;
    }
    body { 
        font-family: 'Cairo', sans-serif; 
        background-color: var(--bg-dark); 
        color: var(--text); 
        margin: 0; 
        display: flex; 
        height: 100vh;
    }
    .sidebar {
        width: 300px;
        background: var(--panel-bg);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
    }
    .sidebar-header {
        padding: 20px;
        background: #111116;
        border-bottom: 1px solid var(--border);
        font-weight: bold;
        text-align: center;
        color: var(--primary);
    }
    #users-list {
        flex: 1;
        overflow-y: auto;
    }
    .user-item {
        padding: 15px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .user-item:hover, .user-item.active {
        background: #2a2a36;
    }
    .user-icon {
        width: 35px; height: 35px;
        background: #444;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
    }
    .chat-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: var(--bg-dark);
    }
    .chat-header {
        padding: 20px;
        background: var(--panel-bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 15px;
    }
    .admin-avatar {
        width: 45px; height: 45px;
        background: linear-gradient(135deg, var(--primary), #8a2be2);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.5rem;
        box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
    }
    #chat-box {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    .msg {
        max-width: 60%;
        padding: 12px 16px;
        border-radius: 15px;
        font-size: 0.95rem;
        line-height: 1.5;
    }
    .msg.user {
        background: #2d2d3a;
        align-self: flex-start;
        border-bottom-right-radius: 2px;
    }
    .msg.admin {
        background: var(--primary);
        align-self: flex-end;
        border-bottom-left-radius: 2px;
    }
    .shortcuts {
        padding: 10px 20px;
        background: var(--panel-bg);
        display: flex;
        gap: 10px;
        overflow-x: auto;
    }
    .shortcuts button {
        background: #2d2d3a;
        border: 1px solid #444;
        color: #fff;
        padding: 8px 15px;
        border-radius: 20px;
        cursor: pointer;
        white-space: nowrap;
        font-family: 'Cairo', sans-serif;
    }
    .shortcuts button:hover { background: #444; }
    .chat-input {
        display: flex;
        padding: 20px;
        background: var(--panel-bg);
    }
    .chat-input input {
        flex: 1;
        padding: 15px;
        border: none;
        border-radius: 10px;
        background: #2d2d3a;
        color: white;
        font-family: 'Cairo', sans-serif;
        outline: none;
    }
    .chat-input button {
        background: var(--primary);
        border: none;
        color: white;
        padding: 0 30px;
        margin-right: 15px;
        border-radius: 10px;
        cursor: pointer;
        font-family: 'Cairo', sans-serif;
        font-weight: bold;
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px;}
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">صندوق الوارد</div>
    <div id="users-list">
        </div>
</div>

<div class="chat-area">
    <div class="chat-header">
        <div class="admin-avatar">👨‍💻</div>
        <div>
            <h3 style="margin: 0; font-size: 1.1rem;">إدارة FawakihAI</h3>
            <span style="font-size: 0.8rem; color: #aaa;" id="current-user-id">اختر محادثة للبدء</span>
        </div>
    </div>

    <div id="chat-box">
        <div style="text-align: center; color: #666; margin-top: 50px;">يرجى اختيار مستخدم من القائمة لعرض المحادثة</div>
    </div>

    <div class="shortcuts">
        <button onclick="sendShortcut('أهلاً بك في دعم FawakihAI، كيف يمكنني مساعدتك؟')">ترحيب</button>
        <button onclick="sendShortcut('تم استلام رسالتك، جاري مراجعة طلبك الآن.')">جاري المراجعة</button>
        <button onclick="sendShortcut('هل تم حل المشكلة التي تواجهها بنجاح؟')">متابعة الحل</button>
        <button onclick="sendShortcut('شكراً لتواصلك معنا، نحن دائماً في الخدمة.')">إنهاء المحادثة</button>
    </div>

    <div class="chat-input">
        <input type="text" id="msg" placeholder="اكتب ردك كمسؤول..." onkeypress="handleKeyPress(event)" disabled>
        <button id="send-btn" onclick="sendMsg()" disabled>إرسال الرد</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3eRFHDhOtKlli3KA8vUyE1--C5F47UYw",
  authDomain: "chatapi-1ca71.firebaseapp.com",
  databaseURL: "https://chatapi-1ca71-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "chatapi-1ca71",
  storageBucket: "chatapi-1ca71.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let activeUser = null;
const usersList = document.getElementById("users-list");
const chatBox = document.getElementById("chat-box");
const msgInput = document.getElementById("msg");
const sendBtn = document.getElementById("send-btn");
const currentUserIdDisplay = document.getElementById("current-user-id");

// جلب قائمة المستخدمين الذين راسلوا الدعم
onValue(ref(db, 'chats'), (snapshot) => {
    usersList.innerHTML = "";
    snapshot.forEach(child => {
        const userId = child.key;
        const userDiv = document.createElement('div');
        userDiv.className = `user-item ${activeUser === userId ? 'active' : ''}`;
        userDiv.innerHTML = `<div class="user-icon">👤</div><div>عميل (${userId.substring(0, 8)})</div>`;
        userDiv.onclick = () => loadChat(userId, userDiv);
        usersList.appendChild(userDiv);
    });
});

let currentChatListener = null;

// تحميل محادثة مستخدم معين
window.loadChat = function(userId, element) {
    activeUser = userId;
    currentUserIdDisplay.innerText = `التحدث مع: ${userId}`;
    msgInput.disabled = false;
    sendBtn.disabled = false;
    
    // تمييز المستخدم المحدد في القائمة
    document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
    if(element) element.classList.add('active');

    // إيقاف الاستماع للمحادثة السابقة إن وجدت
    if(currentChatListener) currentChatListener();

    // جلب رسائل المستخدم المحدد
    const chatRef = ref(db, `chats/${userId}/messages`);
    onValue(chatRef, (snapshot) => {
        chatBox.innerHTML = "";
        snapshot.forEach(child => {
            const data = child.val();
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${data.sender === 'admin' ? 'admin' : 'user'}`;
            msgDiv.innerText = data.message;
            chatBox.appendChild(msgDiv);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });
};

// إرسال الرد
window.sendMsg = function(forcedMsg = null) {
    if(!activeUser) return;
    const msg = forcedMsg || msgInput.value.trim();
    if(msg !== "") {
        push(ref(db, `chats/${activeUser}/messages`), {
            sender: "admin",
            message: msg,
            timestamp: serverTimestamp()
        });
        msgInput.value = "";
    }
};

window.sendShortcut = function(text) {
    sendMsg(text);
};

window.handleKeyPress = function(e) {
    if (e.key === 'Enter') sendMsg();
};
</script>

</body>
</html>
