<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم بوت FawakihAI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background-color: #0b0714; color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .bot-panel {
            background: rgba(20, 15, 30, 0.9);
            border: 2px solid #00d2ff;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }
        h1 { color: #00d2ff; text-align: center; text-shadow: 0 0 15px rgba(0, 210, 255, 0.5); margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #a0a0b0; font-weight: bold; }
        input[type="text"], input[type="password"], textarea, select {
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid rgba(0, 210, 255, 0.3);
            background: rgba(0, 0, 0, 0.5); color: white; font-size: 15px; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus, input[type="password"]:focus, textarea:focus, select:focus { border-color: #00d2ff; box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }
        
        .poll-section { background: rgba(0, 210, 255, 0.05); padding: 15px; border-radius: 10px; border: 1px dashed #00d2ff; margin-bottom: 20px; }
        .bot-identity { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #3a7bd5; }
        
        .btn-send, .btn-login {
            width: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); color: #fff; border: none;
            padding: 18px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s;
        }
        .btn-send:hover, .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.4); }
        .btn-logout {
            width: 100%; background: transparent; color: #ff4c4c; border: 1px solid #ff4c4c;
            padding: 10px; border-radius: 12px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .btn-logout:hover { background: #ff4c4c; color: #fff; }
        
        .file-upload { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; cursor: pointer; }
        .file-upload input { display: none; }
        .file-upload:hover { background: rgba(255,255,255,0.1); }
        
        #preview-img, #preview-bot-img { max-width: 100px; border-radius: 10px; display: none; margin-top: 10px; border: 1px solid #00d2ff; }
        #preview-bot-img { display: block; max-width: 60px; border-radius: 50%; } /* تنسيق لصورة البوت الدائرية */
        #status-msg { text-align: center; margin-top: 15px; font-weight: bold; color: #4caf50; display: none; }
        
        /* إخفاء اللوحة الرئيسية افتراضياً */
        #main-dashboard { display: none; }
    </style>
</head>
<body>

<div class="bot-panel" id="login-screen">
    <h1>🔒 تسجيل الدخول</h1>
    <div class="form-group">
        <label>كلمة المرور:</label>
        <input type="password" id="admin-password" placeholder="أدخل كلمة المرور للوصول...">
    </div>
    <button class="btn-login" onclick="checkLogin()">دخول</button>
</div>

<div class="bot-panel" id="main-dashboard">
    <h1>🤖 نظام البوت لـ FawakihAI</h1>
    
    <div class="bot-identity">
        <div class="form-group" style="margin-bottom: 10px;">
            <label>اسم البوت:</label>
            <input type="text" id="bot-name-input" value="🤖 FawakihAI System" placeholder="اكتب اسم البوت هنا...">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label>صورة البوت (الصورة الشخصية):</label>
            <label class="file-upload">
                <span>🖼️ اختر صورة من الاستديو</span>
                <input type="file" accept="image/*" onchange="handleBotProfileImage(event)">
            </label>
            <img id="preview-bot-img" src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png">
        </div>
    </div>
    
    <div class="form-group">
        <label>نص الإعلان أو التحديث:</label>
        <textarea id="bot-text" rows="4" placeholder="اكتب رسالة البوت هنا..."></textarea>
    </div>

    <div class="form-group">
        <label>إرفاق صورة للمنشور (اختياري):</label>
        <label class="file-upload">
            <span>📷 اختر صورة</span>
            <input type="file" id="bot-image" accept="image/*" onchange="handleImage(event)">
        </label>
        <img id="preview-img" src="">
    </div>

    <div class="form-group poll-section">
        <label>إضافة تصويت (اختياري):</label>
        <input type="text" id="poll-title" placeholder="عنوان التصويت (مثال: هل أعجبكم التحديث؟)" style="margin-bottom: 10px;">
        <div style="display: flex; gap: 10px;">
            <input type="text" id="poll-opt1" placeholder="الخيار الأول (مثال: نعم)">
            <input type="text" id="poll-opt2" placeholder="الخيار الثاني (مثال: لا)">
        </div>
    </div>

    <div class="form-group">
        <label>جدولة الإرسال:</label>
        <select id="schedule-time">
            <option value="0">إرسال الآن فورا 🚀</option>
            <option value="2">إرسال بعد ساعتين ⏳</option>
            <option value="24">إرسال بعد 24 ساعة 📅</option>
        </select>
    </div>

    <div class="form-group">
        <label>تكرار الإعلان:</label>
        <select id="repeat-count">
            <option value="1">إرسال مرة واحدة فقط</option>
            <option value="3">إرسال 3 مرات (بين كل مرة ساعة)</option>
        </select>
    </div>

    <button class="btn-send" onclick="prepareBotMessage()">إطلاق البوت 🚀</button>
    <div id="status-msg">تمت الجدولة بنجاح! سيقوم البوت بعمله.</div>
    
    <button class="btn-logout" onclick="logout()">تسجيل الخروج 🚪</button>
</div>

<script>
    // --- نظام تسجيل الدخول ---
    const SECRET_PASSWORD = "hamzagmail34567";

    // التحقق عند تحميل الصفحة
    window.onload = function() {
        if(localStorage.getItem("fawakih_admin_logged") === "true") {
            showDashboard();
        }
    };

    function checkLogin() {
        const pass = document.getElementById("admin-password").value;
        if(pass === SECRET_PASSWORD) {
            localStorage.setItem("fawakih_admin_logged", "true"); // حفظ تسجيل الدخول
            showDashboard();
        } else {
            alert("كلمة المرور غير صحيحة ❌");
        }
    }

    function showDashboard() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("main-dashboard").style.display = "block";
    }

    function logout() {
        localStorage.removeItem("fawakih_admin_logged");
        document.getElementById("admin-password").value = "";
        document.getElementById("login-screen").style.display = "block";
        document.getElementById("main-dashboard").style.display = "none";
    }

    // السماح بالدخول عند الضغط على زر Enter
    document.getElementById("admin-password").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            checkLogin();
        }
    });

    // --- إعدادات فايربيس والبوت ---
    const firebaseConfig = {
        apiKey: "AIzaSyD3eRFHDhOtKlli3KA8vUyE1--C5F47UYw",
        databaseURL: "https://chatapi-1ca71-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "chatapi-1ca71",
        storageBucket: "chatapi-1ca71.firebasestorage.app",
        appId: "1:1057989927219:android:b3e3b7304228b526b21e46"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const BOT_ID = "SYSTEM_BOT_001";
    let attachedImageBase64 = null;
    let botProfileImageBase64 = "https://cdn-icons-png.flaticon.com/512/4712/4712035.png"; // الصورة الافتراضية

    // دالة لضغط واستدعاء صورة البوت الشخصية (أصغر حجماً لتوفير المساحة)
    function handleBotProfileImage(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 150; // حجم صغير للبروفايل لتوفير مساحة القاعدة
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    // ضغط بجودة 0.5 للصورة الشخصية
                    botProfileImageBase64 = canvas.toDataURL('image/jpeg', 0.5); 
                    const preview = document.getElementById('preview-bot-img');
                    preview.src = botProfileImageBase64;
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }
    }

    // دالة لضغط صورة المنشور المرفقة
    function handleImage(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 500; 
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    attachedImageBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    const preview = document.getElementById('preview-img');
                    preview.src = attachedImageBase64;
                    preview.style.display = 'block';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }
    }

    function prepareBotMessage() {
        const botName = document.getElementById("bot-name-input").value.trim();
        const text = document.getElementById("bot-text").value.trim();
        const pollTitle = document.getElementById("poll-title").value.trim();
        const pollOpt1 = document.getElementById("poll-opt1").value.trim();
        const pollOpt2 = document.getElementById("poll-opt2").value.trim();
        const delayHours = parseInt(document.getElementById("schedule-time").value);
        const repeatCount = parseInt(document.getElementById("repeat-count").value);

        if (!text && !attachedImageBase64 && !pollTitle) {
            alert("الرجاء إدخال رسالة أو صورة أو تصويت.");
            return;
        }

        if (!botName) {
            alert("الرجاء التأكد من كتابة اسم البوت.");
            return;
        }

        // تجهيز بيانات الرسالة باستخدام الاسم والصورة المضغوطة
        const msgData = {
            deviceId: BOT_ID,
            sender: botName,
            senderImg: botProfileImageBase64,
            isBot: true,
            text: text || null,
            image: attachedImageBase64 || null,
        };

        // إضافة التصويت إذا وجد
        if (pollTitle && pollOpt1 && pollOpt2) {
            msgData.poll = {
                title: pollTitle,
                option1: pollOpt1,
                option2: pollOpt2,
                votes1: 0,
                votes2: 0,
                votedUsers: { "init": 0 }
            };
        }

        // حساب وقت الجدولة
        const delayMs = delayHours * 60 * 60 * 1000;
        
        document.getElementById('status-msg').style.display = 'block';
        setTimeout(() => { document.getElementById('status-msg').style.display = 'none'; }, 5000);

        if (delayMs === 0) {
            executeBotTask(msgData, repeatCount);
        } else {
            // الجدولة
            setTimeout(() => {
                executeBotTask(msgData, repeatCount);
            }, delayMs);
        }
        
        // تفريغ الحقول بعد الإرسال
        document.getElementById("bot-text").value = "";
        attachedImageBase64 = null;
        document.getElementById('preview-img').style.display = 'none';
        document.getElementById('bot-image').value = '';
    }

    function executeBotTask(baseMsgData, repeatCount) {
        // إرسال المرة الأولى
        sendToFirebase(baseMsgData);

        if (repeatCount > 1) {
            let count = 1;
            const intervalHours = 1; // تكرار كل ساعة
            const intervalMs = intervalHours * 60 * 60 * 1000;

            const intervalId = setInterval(() => {
                sendToFirebase(baseMsgData);
                count++;
                if (count >= repeatCount) clearInterval(intervalId);
            }, intervalMs);
        }
    }

    function sendToFirebase(msgData) {
        // تحديث الوقت لكل إرسال جديد
        msgData.timestamp = Date.now();
        db.ref('messages_general').push(msgData)
          .then(() => console.log("تم إرسال رسالة البوت بنجاح!"))
          .catch(err => alert("حدث خطأ: " + err));
    }
</script>

</body>
</html>
