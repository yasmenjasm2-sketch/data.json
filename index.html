<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store</title>
<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #0F172A, #020617, #1E293B);
    color: #fff;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container {
    background-color: #1E293B;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    width: 90%;
    max-width: 400px;
    text-align: center;
    border: 1px solid #334155;
}
h2 {
    color: #38BDF8;
    margin-bottom: 10px;
}
p {
    color: #94A3B8;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 20px;
}
.email-box {
    background-color: #0F172A;
    padding: 15px;
    border-radius: 10px;
    border: 1px dashed #38BDF8;
    margin-bottom: 20px;
    font-weight: bold;
    word-break: break-all;
    cursor: pointer;
}
input[type="file"] {
    display: none;
}
.file-label {
    background-color: #2563EB;
    color: white;
    padding: 12px 20px;
    border-radius: 30px;
    cursor: pointer;
    display: inline-block;
    margin-bottom: 20px;
    transition: 0.2s;
}
.file-label:hover {
    background-color: #1D4ED8;
    transform: scale(0.95);
}
#fileName {
    display: block;
    margin-bottom: 20px;
    color: #10B981;
    font-size: 12px;
}
.submit-btn {
    background: #10B981;
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    transition: 0.2s;
    font-weight: bold;
}
.submit-btn:hover {
    background: #059669;
}
.submit-btn:disabled {
    background: #475569;
    cursor: not-allowed;
}
#status {
    margin-top: 15px;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="container">
    <h2>الدفع والاشتراك</h2>
    <p>ارسل الاموال لهذا الحساب وارفق الايصال، سيتم التحقق منك خلال 40 دقيقه وسيتم ادخالك للتطبيق تلقائياً.</p>
    
    <div class="email-box" id="email" onclick="navigator.clipboard.writeText(this.innerText); alert('تم النسخ ✓');">
        hamzaelhumada@gmail.com
    </div>

    <label class="file-label">
        📎 ارفاق الإيصال
        <input type="file" id="fileInput" accept="image/*">
    </label>
    <span id="fileName"></span>

    <button class="submit-btn" id="submitBtn">تأكيد الإرسال</button>
    <div id="status"></div>
</div>

<script>
    const ENC_BOT_TOKEN = "NzU2NjI0OTE3NzpBQUc4REZyOUl1bFpLa1R0ZVZGSGM5VEZwNXFuTUo0c09WQQ==";
    const ENC_CHAT_ID = "NTk5ODI1MDM2Nw==";
    
    const BOT_TOKEN = atob(ENC_BOT_TOKEN);
    const CHAT_ID = atob(ENC_CHAT_ID);

    if (!localStorage.getItem("my_user_id")) {
        localStorage.setItem("my_user_id", "ID-" + Math.floor(10000 + Math.random() * 90000));
    }
    const userId = localStorage.getItem("my_user_id");
    const deviceId = navigator.userAgent;

    const fileInput = document.getElementById("fileInput");
    const fileNameDisplay = document.getElementById("fileName");
    const submitBtn = document.getElementById("submitBtn");
    const statusDisplay = document.getElementById("status");

    fileInput.addEventListener("change", function() {
        if (this.files.length > 0) {
            fileNameDisplay.textContent = "تم إرفاق: " + this.files[0].name;
        } else {
            fileNameDisplay.textContent = "";
        }
    });

    submitBtn.addEventListener("click", async function() {
        if (fileInput.files.length === 0) {
            statusDisplay.textContent = "الرجاء إرفاق صورة الإيصال أولاً.";
            statusDisplay.style.color = "#EF4444";
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "جاري الإرسال...";
        statusDisplay.textContent = "";

        const file = fileInput.files[0];
        const caption = `رسالة دعم فني\n\nرقم المستخدم: \`${userId}\`\nالجهاز: \`${deviceId}\`\n\nللرد، انسخ رقم المستخدم وضعه في بداية رسالتك.`;

        const formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        formData.append("photo", file);
        formData.append("caption", caption);
        formData.append("parse_mode", "Markdown");

        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: "POST",
                body: formData
            });

            if (response.ok) {
                statusDisplay.textContent = "تم إرسال الإيصال بنجاح. يرجى الانتظار...";
                statusDisplay.style.color = "#10B981";
                fileInput.value = "";
                fileNameDisplay.textContent = "";
            } else {
                statusDisplay.textContent = "فشل الإرسال.";
                statusDisplay.style.color = "#EF4444";
            }
        } catch (error) {
            statusDisplay.textContent = "فشل الإرسال، تأكد من اتصالك بالإنترنت.";
            statusDisplay.style.color = "#EF4444";
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "تأكيد الإرسال";
        }
    });
</script>

</body>
</html>
