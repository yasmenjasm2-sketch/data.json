<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chat System Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* التنسيق الاحترافي (Dark Premium) */
        :root { --main-color: #00d2ff; --bg-dark: #0f0f13; --card-bg: #1c1c24; }
        body { background-color: var(--bg-dark); color: #fff; margin: 0; font-family: 'Cairo', sans-serif; overflow: hidden; }
        #chat-container { height: 100vh; display: flex; flex-direction: column; }
        .header { background: var(--card-bg); padding: 15px; text-align: center; border-bottom: 2px solid var(--main-color); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: var(--card-bg); padding: 10px 15px; border-radius: 15px 15px 0 15px; max-width: 80%; align-self: flex-start; position: relative; animation: fadeIn 0.3s ease; }
        .msg.mine { align-self: flex-end; background: var(--main-color); color: #000; border-radius: 15px 15px 15px 0; }
        .user-img { width: 30px; height: 30px; border-radius: 50%; vertical-align: middle; margin-left: 8px; cursor: pointer; border: 1px solid var(--main-color); }
        .time { font-size: 9px; opacity: 0.7; margin-top: 5px; display: block; }
        .input-area { background: var(--card-bg); padding: 10px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: #2a2a35; border: none; padding: 12px; border-radius: 25px; color: #fff; outline: none; }
        .send-btn { background: var(--main-color); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="header">
        <h3 id="app-title" style="margin:0;">FawakihAI Chat</h3>
    </div>
    
    <div id="login-box" style="padding: 20px; text-align: center; margin-top: 50px;">
        <input type="text" id="user-name" placeholder="أدخل اسمك المستعار (24 حرف)" maxlength="24" style="width: 80%; margin-bottom: 20px;">
        <button onclick="startChat()" class="send-btn" style="width: auto; padding: 0 30px; border-radius: 10px; font-size: 16px;">دخول</button>
    </div>

    <div id="chat-box" class="hidden" style="display:contents;">
        <div id="messages"></div>
        <div class="input-area">
            <label style="cursor:pointer; font-size: 24px;">🖼️<input type="file" id="img-upload" accept="image/*" style="display:none;" onchange="uploadPhoto(this)"></label>
            <input type="text" id="msg-text" placeholder="اكتب رسالة...">
            <button class="send-btn" onclick="sendMsg()">🚀</button>
        </div>
    </div>
</div>

<script>
    // تشفير الروابط والمفاتيح بـ Base64 لزيادة الأمان الاحترافي
    const _0x4a = {
        k: "QUl6YVN5RDNlUkZIRGhPdEtsbGkzS0E4dlV5RTEtLUM1RjQ3VVl3", // API Key
        u: "aHR0cHM6Ly9jaGF0YXBpLTFjYTcxLWRlZmF1bHQtcnRkYi5ldXJvcGUtd2VzdDEuZmlyZWJhc2VkYXRhYmFzZS5hcHA=", // DB URL
        p: "Y2hhdGFwaS0xY2E3MQ==", // Project ID
        s: "Y2hhdGFwaS0xY2E3MS5maXJlYmFzZXN0b3JhZ2UuYXBw" // Storage
    };

    const firebaseConfig = {
        apiKey: atob(_0x4a.k),
        databaseURL: atob(_0x4a.u),
        projectId: atob(_0x4a.p),
        storageBucket: atob(_0x4a.s)
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // جلب معرف الأندرويد الحقيقي عبر الجسر البرمجي
    let deviceId = "WebUser_" + Math.random().toString(36).substr(2, 9);
    if (window.AndroidBridge) {
        deviceId = window.AndroidBridge.getDeviceId();
    }

    let user = { name: "", isAdmin: false };
    let tempImg = null;

    function startChat() {
        let name = document.getElementById("user-name").value.trim();
        if(!name) return alert("الاسم مطلوب");
        
        // التحقق من الحظر والآدمن
        db.ref('bans/' + deviceId).once('value', s => {
            if(s.exists()) return alert("عذراً، جهازك محظور.");
            
            user.name = name;
            db.ref('admins/' + deviceId).once('value', a => {
                if(a.exists()) user.isAdmin = true;
                document.getElementById("login-box").classList.add("hidden");
                loadMsgs();
            });
        });
    }

    function uploadPhoto(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            // ضغط الصورة برمجياً قبل الرفع
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 400; canvas.height = (img.height / img.width) * 400;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                tempImg = canvas.toDataURL('image/jpeg', 0.5); // جودة 50% لتقليل المساحة
                alert("تم تجهيز الصورة مضغوطة ✅");
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function sendMsg() {
        const txt = document.getElementById("msg-text").value.trim();
        if(!txt && !tempImg) return;

        db.ref('messages').push({
            did: deviceId,
            n: user.name,
            t: txt,
            img: tempImg,
            time: Date.now()
        });
        document.getElementById("msg-text").value = "";
        tempImg = null;
    }

    function loadMsgs() {
        db.ref('messages').limitToLast(50).on('child_added', s => {
            const d = s.val();
            const isMine = d.did === deviceId;
            const timeStr = new Date(d.time).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
            
            const html = `
                <div class="msg ${isMine?'mine':''}">
                    <div style="font-size:11px; font-weight:bold; margin-bottom:5px;">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${d.did}" class="user-img" onclick="adminAction('${d.did}')">
                        ${d.n}
                    </div>
                    ${d.t ? `<div>${d.t}</div>` : ''}
                    ${d.img ? `<img src="${d.img}" style="max-width:100%; border-radius:10px; margin-top:5px;">` : ''}
                    <span class="time">${timeStr}</span>
                </div>
            `;
            document.getElementById("messages").innerHTML += html;
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });
    }

    function adminAction(targetId) {
        if(user.isAdmin) {
            if(confirm("المعرف: " + targetId + "\nهل تريد حظر هذا الجهاز؟")) {
                db.ref('bans/' + targetId).set(true);
                alert("تم الحظر.");
            }
        }
    }
</script>

</body>
</html>
