<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store & Support</title>
<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #0F172A, #020617, #1E293B);
    color: #fff;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container {
    background-color: #1E293B;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    width: 95%;
    max-width: 450px;
    border: 1px solid #334155;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}
#paymentView {
    padding: 30px;
    text-align: center;
}
#chatView {
    display: none;
    height: 85vh;
}
h2 { color: #38BDF8; margin-top: 0; margin-bottom: 10px; }
p { color: #94A3B8; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
.email-box {
    background-color: #0F172A;
    padding: 15px;
    border-radius: 10px;
    border: 1px dashed #38BDF8;
    margin-bottom: 20px;
    font-weight: bold;
    word-break: break-all;
    cursor: pointer;
}
input[type="file"] { display: none; }
.file-label {
    background-color: #2563EB;
    color: white;
    padding: 12px 20px;
    border-radius: 30px;
    cursor: pointer;
    display: inline-block;
    margin-bottom: 20px;
    transition: 0.2s;
    font-size: 14px;
}
.file-label:hover { background-color: #1D4ED8; }
#fileName { display: block; margin-bottom: 20px; color: #10B981; font-size: 12px; }
.submit-btn {
    background: #10B981;
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    transition: 0.2s;
    font-weight: bold;
}
.submit-btn:hover { background: #059669; }
.submit-btn:disabled { background: #475569; cursor: not-allowed; }
#status { margin-top: 15px; font-size: 14px; }

.chat-header {
    background-color: #1E293B;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 4px solid #38BDF8;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    z-index: 10;
}
.chat-header-info h3 { margin: 0; font-size: 18px; color: #fff; }
.chat-header-info span { font-size: 12px; color: #10B981; }
.clear-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #fff; }
.chat-body {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
    background: linear-gradient(135deg, #0F172A, #020617);
}
.msg-row { display: flex; width: 100%; }
.msg-row.user { justify-content: flex-start; }
.msg-row.admin { justify-content: flex-end; }
.msg-bubble {
    max-width: 80%;
    padding: 12px 16px;
    font-size: 15px;
    line-height: 1.5;
    word-wrap: break-word;
    position: relative;
}
.msg-row.user .msg-bubble {
    background: linear-gradient(90deg, #2563EB, #3B82F6);
    border-radius: 20px 20px 0 20px;
    color: #fff;
}
.msg-row.admin .msg-bubble {
    background: #1E293B;
    border: 1px solid #334155;
    border-radius: 20px 20px 20px 0;
    color: #fff;
}
.msg-bubble img {
    max-width: 100%;
    border-radius: 10px;
    margin-bottom: 5px;
}
.msg-time {
    display: block;
    font-size: 10px;
    margin-top: 5px;
    opacity: 0.7;
}
.msg-row.user .msg-time { text-align: left; color: #93C5FD; }
.msg-row.admin .msg-time { text-align: right; color: #94A3B8; }
.admin-name {
    display: block;
    color: #38BDF8;
    font-size: 11px;
    font-weight: bold;
    margin-bottom: 5px;
}
.chat-footer {
    background-color: #0F172A;
    padding: 15px;
    border-top: 1px solid #334155;
    border-radius: 30px 30px 0 0;
}
.attach-area {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    margin-bottom: 10px;
}
.chat-attach-btn {
    background: none;
    border: none;
    color: #38BDF8;
    cursor: pointer;
    font-size: 13px;
}
#chatFileName { color: #10B981; font-size: 12px; margin-left: 10px; display: none; }
.input-area {
    display: flex;
    align-items: center;
    gap: 10px;
}
.chat-input {
    flex: 1;
    background-color: #1E293B;
    border: 1px solid #334155;
    border-radius: 20px;
    padding: 12px 15px;
    color: #fff;
    outline: none;
    font-size: 14px;
}
.chat-send-btn {
    background-color: #2563EB;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-size: 18px;
    transition: 0.2s;
}
.chat-send-btn:active { transform: scale(0.9); }
.typing-indicator {
    font-style: italic;
    color: #38BDF8;
    font-size: 13px;
    animation: blink 1s infinite alternate;
}
@keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
</style>
</head>
<body>

<div id="paymentView" class="container">
    <h2>الدفع والاشتراك</h2>
    <p>ارسل الاموال لهذا الحساب وارفق الايصال، سيتم التحقق منك خلال 40 دقيقه وسيتم ادخالك للتطبيق تلقائياً.</p>
    <div class="email-box" onclick="navigator.clipboard.writeText(this.innerText); alert('تم النسخ ✓');">
        hamzaelhumada@gmail.com
    </div>
    <label class="file-label">
        📎 ارفاق الإيصال
        <input type="file" id="payFileInput" accept="image/*">
    </label>
    <span id="payFileName"></span>
    <button class="submit-btn" id="paySubmitBtn">تأكيد الإرسال</button>
    <div id="payStatus"></div>
</div>

<div id="chatView" class="container">
    <div class="chat-header">
        <button class="clear-btn" id="clearChatBtn">🗑️</button>
        <div class="chat-header-info">
            <h3>الدعم الفني والخدمات</h3>
            <span>متصل الآن 🟢</span>
        </div>
    </div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-footer">
        <div class="attach-area">
            <span id="chatFileName"></span>
            <label class="chat-attach-btn">
                📎 إرفاق صورة
                <input type="file" id="chatFileInput" accept="image/*">
            </label>
        </div>
        <div class="input-area">
            <input type="text" id="chatInput" class="chat-input" placeholder="اكتب رسالتك هنا...">
            <button class="chat-send-btn" id="chatSendBtn">➤</button>
        </div>
    </div>
</div>

<script>
    const ENC_BOT_TOKEN = "NzU2NjI0OTE3NzpBQUc4REZyOUl1bFpLa1R0ZVZGSGM5VEZwNXFuTUo0c09WQQ==";
    const ENC_CHAT_ID = "NTk5ODI1MDM2Nw==";
    const BOT_TOKEN = atob(ENC_BOT_TOKEN);
    const CHAT_ID = atob(ENC_CHAT_ID);

    if (!localStorage.getItem("fawakih_user_id")) {
        localStorage.setItem("fawakih_user_id", "ID-" + Math.floor(10000 + Math.random() * 90000));
    }
    const userId = localStorage.getItem("fawakih_user_id");
    const deviceId = navigator.userAgent;

    let tickets = JSON.parse(localStorage.getItem("fawakih_tickets") || "[]");
    let isPolling = false;
    let isAdminTyping = false;

    const paymentView = document.getElementById("paymentView");
    const chatView = document.getElementById("chatView");
    const chatBody = document.getElementById("chatBody");

    if (tickets.length > 0) {
        showChat();
    }

    document.getElementById("payFileInput").addEventListener("change", function() {
        document.getElementById("payFileName").textContent = this.files.length > 0 ? "تم إرفاق: " + this.files[0].name : "";
    });

    document.getElementById("paySubmitBtn").addEventListener("click", async function() {
        const fileInput = document.getElementById("payFileInput");
        const statusDisplay = document.getElementById("payStatus");
        
        if (fileInput.files.length === 0) {
            statusDisplay.textContent = "الرجاء إرفاق صورة الإيصال أولاً.";
            statusDisplay.style.color = "#EF4444";
            return;
        }

        this.disabled = true;
        this.textContent = "جاري الإرسال...";
        
        const file = fileInput.files[0];
        const success = await sendToTelegram("رسالة دعم فني\n\nإيصال دفع جديد", file);
        
        if (success) {
            const reader = new FileReader();
            reader.onload = function(e) {
                addTicket("تم إرسال الإيصال. يرجى التحقق.", e.target.result);
                showChat();
            };
            reader.readAsDataURL(file);
        } else {
            statusDisplay.textContent = "فشل الإرسال، تأكد من اتصالك بالإنترنت.";
            statusDisplay.style.color = "#EF4444";
            this.disabled = false;
            this.textContent = "تأكيد الإرسال";
        }
    });

    document.getElementById("chatFileInput").addEventListener("change", function() {
        const nameDisplay = document.getElementById("chatFileName");
        if (this.files.length > 0) {
            nameDisplay.textContent = "تم الإرفاق ✓";
            nameDisplay.style.display = "inline";
        } else {
            nameDisplay.style.display = "none";
        }
    });

    document.getElementById("chatSendBtn").addEventListener("click", async function() {
        const input = document.getElementById("chatInput");
        const fileInput = document.getElementById("chatFileInput");
        const msg = input.value.trim();
        const file = fileInput.files.length > 0 ? fileInput.files[0] : null;

        if (!msg && !file) return;

        input.value = "";
        document.getElementById("chatFileName").style.display = "none";
        
        let imgData = null;
        if (file) {
            const reader = new FileReader();
            reader.onload = async function(e) {
                imgData = e.target.result;
                addTicket(msg, imgData);
                await sendToTelegram(msg, file);
            };
            reader.readAsDataURL(file);
        } else {
            addTicket(msg, null);
            await sendToTelegram(msg, null);
        }
        fileInput.value = "";
    });

    document.getElementById("clearChatBtn").addEventListener("click", () => {
        if (confirm("هل أنت متأكد من مسح جميع الرسائل؟")) {
            tickets = [];
            saveTickets();
            renderChat();
        }
    });

    function showChat() {
        paymentView.style.display = "none";
        chatView.style.display = "flex";
        renderChat();
        if (!isPolling) {
            isPolling = true;
            pollTelegram();
        }
    }

    async function sendToTelegram(text, file) {
        const caption = `رسالة دعم فني\n\nرقم المستخدم: \`${userId}\`\nالجهاز: \`${deviceId}\`\n\nالرسالة:\n${text}\n\nللرد، انسخ رقم المستخدم وضعه في بداية رسالتك.`;
        const formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        formData.append("parse_mode", "Markdown");

        let url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        if (file) {
            url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
            formData.append("photo", file);
            formData.append("caption", caption);
        } else {
            formData.append("text", caption);
        }

        try {
            const res = await fetch(url, { method: "POST", body: formData });
            return res.ok;
        } catch (e) {
            return false;
        }
    }

    function addTicket(userMsg, imgData, adminReply = "", isReplied = false) {
        const time = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        tickets.push({ id: userId, userMsg, adminReply, isReplied, imgData, time });
        saveTickets();
        renderChat();
    }

    function saveTickets() {
        try {
            localStorage.setItem("fawakih_tickets", JSON.stringify(tickets));
        } catch (e) {
            tickets.forEach(t => t.imgData = null);
            localStorage.setItem("fawakih_tickets", JSON.stringify(tickets));
        }
    }

    function renderChat() {
        chatBody.innerHTML = "";
        if (tickets.length === 0 && !isAdminTyping) {
            chatBody.innerHTML = `<div style="text-align:center; color:#475569; margin-top:50px;">أهلاً بك في مركز الدعم الفني<br>كيف يمكننا مساعدتك اليوم؟</div>`;
            return;
        }

        tickets.forEach(t => {
            if (t.userMsg || t.imgData) {
                let imgHtml = t.imgData ? `<img src="${t.imgData}">` : "";
                let msgHtml = t.userMsg ? `<div>${t.userMsg}</div>` : "";
                chatBody.innerHTML += `
                    <div class="msg-row user">
                        <div class="msg-bubble" onclick="navigator.clipboard.writeText('${t.userMsg}'); alert('تم النسخ ✓');">
                            ${imgHtml}${msgHtml}
                            <span class="msg-time">${t.time || ''}</span>
                        </div>
                    </div>`;
            }
            if (t.isReplied && t.adminReply) {
                chatBody.innerHTML += `
                    <div class="msg-row admin">
                        <div class="msg-bubble" onclick="navigator.clipboard.writeText('${t.adminReply}'); alert('تم النسخ ✓');">
                            <span class="admin-name">فريق الدعم</span>
                            <div>${t.adminReply.replace(/\n/g, '<br>')}</div>
                            <span class="msg-time">${t.time || ''}</span>
                        </div>
                    </div>`;
            }
        });

        if (isAdminTyping) {
            chatBody.innerHTML += `
                <div class="msg-row admin" id="typingIndicator">
                    <div class="msg-bubble">
                        <span class="admin-name">فريق الدعم</span>
                        <div class="typing-indicator">جاري الكتابة...</div>
                    </div>
                </div>`;
        }

        setTimeout(() => chatBody.scrollTop = chatBody.scrollHeight, 100);
    }

    async function pollTelegram() {
        let offset = localStorage.getItem("fawakih_tg_offset") || 0;
        while (isPolling) {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${offset}&timeout=30`);
                if (res.ok) {
                    const data = await res.json();
                    for (let item of data.result) {
                        offset = item.update_id + 1;
                        localStorage.setItem("fawakih_tg_offset", offset);
                        
                        if (item.message && item.message.text) {
                            const text = item.message.text;
                            if (text.includes(userId) && !text.includes("رسالة دعم فني")) {
                                const cleanReply = text.replace(userId, "").replace(/^[:\-]/, "").trim();
                                
                                isAdminTyping = true;
                                renderChat();
                                
                                await new Promise(r => setTimeout(r, 4000));
                                
                                isAdminTyping = false;
                                let attached = false;
                                const time = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                                
                                for (let i = tickets.length - 1; i >= 0; i--) {
                                    if (!tickets[i].isReplied && tickets[i].id === userId) {
                                        tickets[i].adminReply = cleanReply;
                                        tickets[i].isReplied = true;
                                        tickets[i].time = time;
                                        attached = true;
                                        break;
                                    }
                                }
                                
                                if (!attached) {
                                    tickets.push({ id: userId, userMsg: "", adminReply: cleanReply, isReplied: true, imgData: null, time });
                                }
                                
                                saveTickets();
                                renderChat();
                            }
                        }
                    }
                }
            } catch (e) {}
            await new Promise(r => setTimeout(r, 3000));
        }
    }
</script>

</body>
</html>
