import os

html_content = """<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدفع الاحترافية | اشتراك</title>
    <style>
        :root {
            --paypal-blue: #003087;
            --paypal-light-blue: #0070ba;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .payment-container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .header h2 {
            color: var(--text-color);
            margin-bottom: 1rem;
        }

        .order-details {
            margin: 1.5rem 0;
            padding: 1rem;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .price {
            font-size: 24px;
            font-weight: bold;
            color: var(--paypal-blue);
        }

        .status-message {
            margin-top: 1rem;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

        .success { background-color: #d4edda; color: #155724; display: block; }
        .error { background-color: #f8d7da; color: #721c24; display: block; }

        #paypal-button-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="payment-container">
        <div class="header">
            <h2>إتمام عملية الدفع</h2>
        </div>

        <div class="order-details">
            <p>تفعيل الاشتراك</p>
            <div class="price">1.00 USD</div>
        </div>

        <div id="status-area" class="status-message"></div>
        <div id="paypal-button-container"></div>
    </div>

    <script src="https://www.paypal.com/sdk/js?client-id=EBzNOyDOfmajE5dnAOiteSj1mwhlMBBxqlkBYC3_5cfIAicOlxHGKinvMdUzOh-RQBP57qAmEqOPTwoQ&currency=USD"></script>

    <script>
        const statusArea = document.getElementById('status-area');

        paypal.Buttons({
            // تخصيص شكل الزر
            style: {
                layout: 'vertical',
                color:  'gold',
                shape:  'rect',
                label:  'paypal'
            },

            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        description: "اشتراك خدمة برمجية",
                        amount: {
                            currency_code: 'USD',
                            // تم تعديل المبلغ الفعلي الذي سيتم سحبه هنا
                            value: '1.00'
                        }
                    }]
                });
            },

            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    statusArea.className = "status-message success";
                    statusArea.innerHTML = '✅ تم الدفع بنجاح! شكرًا لك ' + details.payer.name.given_name;
                    document.getElementById('paypal-button-container').style.display = 'none';
                    
                    // يمكنك هنا إضافة كود لتوجيه المستخدم بعد نجاح الدفع
                    // window.location.href = "رابط_تحميل_تطبيقك_أو_صفحة_النجاح";
                });
            },

            onCancel: function (data) {
                statusArea.className = "status-message error";
                statusArea.innerHTML = '⚠️ تم إلغاء عملية الدفع من قبل المستخدم.';
                statusArea.style.display = 'block';
            },

            onError: function (err) {
                statusArea.className = "status-message error";
                statusArea.innerHTML = '❌ حدث خطأ أثناء الاتصال بالخادم.';
                statusArea.style.display = 'block';
                console.error(err);
            }

        }).render('#paypal-button-container');
    </script>
</body>
</html>
