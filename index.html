<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدفع الاحترافية</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .payment-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        input[type="email"] { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; text-align: center; }
        .btn-confirm { background: #0070ba; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; }
        #paypal-area { display: none; margin-top: 20px; }
        .price-badge { font-size: 24px; font-weight: bold; color: #003087; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="payment-box">
    <h2>تفعيل الاشتراك</h2>
    <p>أدخل بريدك الإلكتروني المسجل في PayPal للمتابعة</p>
    
    <div class="price-badge">1.00 USD</div>

    <div id="email-section">
        <input type="email" id="user-email" placeholder="example@email.com" required>
        <button class="btn-confirm" onclick="showPayment()">تأكيد وإظهار الدفع</button>
    </div>

    <div id="paypal-area">
        <p>الآن اضغط على الزر أدناه لإتمام عملية التحويل:</p>
        <div id="paypal-button-container"></div>
    </div>
</div>

<script src="https://www.paypal.com/sdk/js?client-id=EBzNOyDOfmajE5dnAOiteSj1mwhlMBBxqlkBYC3_5cfIAicOlxHGKinvMdUzOh-RQBP57qAmEqOPTwoQ&currency=USD"></script>

<script>
function showPayment() {
    const email = document.getElementById('user-email').value;
    if(email.includes('@')) {
        document.getElementById('email-section').style.display = 'none';
        document.getElementById('paypal-area').style.display = 'block';
        
        // تشغيل أزرار باي بال
        renderPayPalButtons();
    } else {
        alert('يرجى إدخال بريد إلكتروني صحيح');
    }
}

function renderPayPalButtons() {
    paypal.Buttons({
        style: { layout: 'vertical', color: 'gold', shape: 'rect' },
        createOrder: function(data, actions) {
            return actions.order.create({
                purchase_units: [{
                    description: "اقتاع اشتراك من: " + document.getElementById('user-email').value,
                    amount: { value: '1.00' }
                }]
            });
        },
        onApprove: function(data, actions) {
            return actions.order.capture().then(function(details) {
                alert('شكراً لك! تم استلام الـ 1 دولار بنجاح من حسابك.');
                // هنا يمكنك ربط الكود بقاعدة بياناتك لتفعيل حساب المستخدم تلقائياً
            });
        }
    }).render('#paypal-button-container');
}
</script>

</body>
</html>
