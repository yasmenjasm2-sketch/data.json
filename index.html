<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات عام</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app { width: 100%; max-width: 500px; height: 100vh; background: #1e1e1e; display: flex; flex-direction: column; position: relative; }
        .hidden { display: none !important; }
        
        /* Login Screen */
        #login-screen { padding: 40px 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        h1 { color: #bb86fc; margin-bottom: 30px; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #333; border-radius: 8px; background: #121212; color: white; margin-bottom: 20px; outline: none; }
        input[type="text"]:focus { border-color: #bb86fc; }
        input[type="file"] { margin-bottom: 20px; color: #aaa; }
        button { background: #bb86fc; color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        button:hover { background: #9b59b6; }

        /* Chat Screen */
        #chat-screen { display: flex; flex-direction: column; height: 100%; }
        #header { background: #2c2c2c; padding: 15px; text-align: center; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { background: #2c2c2c; padding: 10px 15px; border-radius: 12px; max-width: 85%; align-self: flex-start; word-wrap: break-word; }
        .message.mine { background: #bb86fc; color: #000; align-self: flex-end; }
        .msg-header { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; cursor: pointer; }
        .msg-header img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .msg-name { font-weight: bold; font-size: 14px; }
        .mine .msg-name { color: #000; }
        .msg-time { font-size: 11px; color: #aaa; margin-top: 5px; text-align: left; }
        .mine .msg-time { color: #333; }
        .msg-image { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        
        #input-area { background: #2c2c2c; padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; }
        #input-area input[type="text"] { flex: 1; margin: 0; padding: 12px; border: none; border-radius: 20px; background: #444; color: white; }
        .file-btn { background: #444; padding: 10px; border-radius: 50%; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; width: 40px; height: 40px; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen">
        <h1>الدخول للشات</h1>
        <input type="text" id="username" placeholder="اكتب اسمك (أقصى حد 24 حرف)" maxlength="24">
        <label style="color: #aaa; text-align: right; display: block; margin-bottom: 5px;">صورة الحساب (اختياري، يتم ضغطها):</label>
        <input type="file" id="user-image" accept="image/*">
        <button onclick="login()">دخول الدردشة</button>
    </div>

    <div id="chat-screen" class="hidden">
        <div id="header">
            <h3 style="margin:0; color:#bb86fc;">الدردشة العامة</h3>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <label class="file-btn">
                📎 <input type="file" id="msg-image" accept="image/*" style="display:none;" onchange="handleImageSelect(event)">
            </label>
            <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا...">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyD3eRFHDhOtKlli3KA8vUyE1--C5F47UYw",
        databaseURL: "https://chatapi-1ca71-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "chatapi-1ca71",
        storageBucket: "chatapi-1ca71.firebasestorage.app",
        appId: "1:1057989927219:android:b3e3b7304228b526b21e46"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // توليد أو جلب معرف الجهاز (Device ID)
    let deviceId = localStorage.getItem("chat_device_id");
    if (!deviceId) {
        deviceId = 'device_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
        localStorage.setItem("chat_device_id", deviceId);
    }

    let currentUser = { name: "", image: "", isAdmin: false };
    let attachedImageBase64 = null;

    // دالة ضغط الصور لتوفير المساحة السحابية (تعيد الصورة بصيغة Base64 مصغرة)
    function compressImage(file, callback) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 500; // أقصى عرض
                let width = img.width;
                let height = img.height;
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                // جودة الصورة 60% لتوفير مساحة مهولة
                callback(canvas.toDataURL('image/jpeg', 0.6));
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    }

    function login() {
        const name = document.getElementById("username").value.trim();
        const fileInput = document.getElementById("user-image").files[0];
        
        if (!name) return alert("يرجى إدخال اسم.");
        
        // التحقق من الحظر
        db.ref('bans/' + deviceId).once('value', snapshot => {
            if (snapshot.exists()) return alert("هذا الجهاز محظور من دخول الشات.");
            
            currentUser.name = name;
            db.ref('admins/' + deviceId).once('value', adminSnap => {
                if (adminSnap.exists()) currentUser.isAdmin = true;
                
                if (fileInput) {
                    compressImage(fileInput, (compressedImg) => {
                        currentUser.image = compressedImg;
                        finishLogin();
                    });
                } else {
                    currentUser.image = "https://cdn-icons-png.flaticon.com/512/149/149071.png"; // صورة افتراضية
                    finishLogin();
                }
            });
        });
    }

    function finishLogin() {
        db.ref('users/' + deviceId).set({ name: currentUser.name, image: currentUser.image, lastLogin: Date.now() });
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("chat-screen").classList.remove("hidden");
        loadMessages();
    }

    function handleImageSelect(e) {
        const file = e.target.files[0];
        if (file) {
            compressImage(file, (base64) => { attachedImageBase64 = base64; alert("تم إرفاق الصورة ومقاسها مضبوط بنجاح."); });
        }
    }

    function sendMessage() {
        const text = document.getElementById("msg-input").value.trim();
        if (!text && !attachedImageBase64) return;

        const msgData = {
            deviceId: deviceId,
            sender: currentUser.name,
            senderImg: currentUser.image,
            text: text,
            image: attachedImageBase64 || null,
            timestamp: Date.now()
        };

        db.ref('messages').push(msgData);
        document.getElementById("msg-input").value = "";
        attachedImageBase64 = null;
        document.getElementById("msg-image").value = "";
    }

    function loadMessages() {
        db.ref('messages').on('child_added', snapshot => {
            const data = snapshot.val();
            const msgDiv = document.createElement("div");
            msgDiv.className = "message " + (data.deviceId === deviceId ? "mine" : "");
            
            const time = new Date(data.timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

            let html = `
                <div class="msg-header" onclick="checkAdminClick('${data.deviceId}')">
                    <img src="${data.senderImg}" alt="Avatar">
                    <span class="msg-name">${data.sender}</span>
                </div>`;
            if (data.text) html += `<div>${data.text}</div>`;
            if (data.image) html += `<img src="${data.image}" class="msg-image">`;
            html += `<div class="msg-time">${time}</div>`;
            
            msgDiv.innerHTML = html;
            document.getElementById("messages").appendChild(msgDiv);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });
    }

    // خاصية مخصصة للآدمن عند الضغط على الصورة
    function checkAdminClick(targetDeviceId) {
        if (currentUser.isAdmin) {
            alert("معرف الجهاز (Device ID) للمستخدم:\n" + targetDeviceId);
        }
    }
</script>

</body>
</html>
