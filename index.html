<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>شات مباشر</title>
<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
#chat { height:300px; overflow:auto; border:1px solid #444; padding:10px; margin:10px; }
input, button { padding:10px; margin:5px; }
</style>
</head>

<body>

<h2>💬 شات مباشر</h2>

<div id="chat"></div>

<input id="name" placeholder="اسمك"><br>
<input id="msg" placeholder="اكتب رسالة"><br>
<button onclick="sendMsg()">إرسال</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3eRFHDhOtKlli3KA8vUyE1--C5F47UYw",
  authDomain: "chatapi-1ca71.firebaseapp.com",
  databaseURL: "https://chatapi-1ca71-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "chatapi-1ca71",
  storageBucket: "chatapi-1ca71.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.sendMsg = function() {
  const name = document.getElementById("name").value;
  const msg = document.getElementById("msg").value;

  if(msg !== "") {
    push(ref(db, "chat"), {
      name: name,
      message: msg
    });
    document.getElementById("msg").value = "";
  }
};

const chatDiv = document.getElementById("chat");

onValue(ref(db, "chat"), (snapshot) => {
  chatDiv.innerHTML = "";
  snapshot.forEach(child => {
    const data = child.val();
    chatDiv.innerHTML += `<p><b>${data.name}:</b> ${data.message}</p>`;
  });
});
</script>

</body>
</html>
