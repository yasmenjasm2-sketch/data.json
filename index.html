<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعم Fawakih AI - تذكرة جديدة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
    
    body { 
        background: linear-gradient(-45deg, #0f172a, #1e1b4b, #064e3b, #0f172a);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        color: #fff; 
        height: 100vh; 
        display: flex; 
        flex-direction: column; 
        overflow: hidden; 
    }
    
    @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    .header { 
        background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 10; 
    }
    .header-left { display: flex; align-items: center; }
    
    .admin-avatar-header { 
        width: 45px; height: 45px; background: linear-gradient(135deg, #10b981, #059669); 
        border-radius: 50%; display: flex; justify-content: center; align-items: center; 
        margin-left: 15px; box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); overflow: hidden;
    }
    .admin-avatar-header img { width: 100%; height: 100%; object-fit: cover; }
    
    .header-info h2 { font-size: 17px; font-weight: 700; color: #f8fafc; }
    .status-text { font-size: 12px; font-weight: bold; transition: color 0.3s; }
    .status-online-text { color: #34d399; }
    .status-offline-text { color: #f87171; }

    /* Offline Request Button */
    #offlineRequestBtn {
        background: #f87171; color: white; border: none; padding: 8px 15px; border-radius: 20px;
        font-size: 12px; font-weight: bold; cursor: pointer; animation: popIn 0.5s; display: none;
        box-shadow: 0 0 10px rgba(248, 113, 113, 0.5);
    }
    #offlineRequestBtn:hover { background: #ef4444; }

    .screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
    .hidden { display: none !important; }

    .form-card { 
        background: rgba(30, 41, 59, 0.65); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; 
        border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center;
        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
    }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.8) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

    .form-card h3 { margin-bottom: 10px; font-size: 22px; color: #10b981; }
    .form-card p { font-size: 14px; color: #cbd5e1; margin-bottom: 25px; }

    /* Chat Area */
    #chatScreen { padding: 0; justify-content: flex-start; align-items: stretch; }
    .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth;}
    
    .msg-row { display: flex; align-items: flex-end; gap: 10px; width: 100%; animation: fadeIn 0.4s ease; }
    .msg-row.user { justify-content: flex-start; }
    .msg-row.admin { justify-content: flex-end; flex-direction: row-reverse; }

    .msg-avatar { width: 35px; height: 35px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 50%; display: flex; justify-content: center; align-items: center; flex-shrink: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.2); overflow: hidden; }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg-avatar svg { width: 18px; height: 18px; }

    .msg-bubble { max-width: 75%; padding: 12px 18px; border-radius: 18px; font-size: 14.5px; line-height: 1.6; word-wrap: break-word; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .msg-user { background: linear-gradient(135deg, #10b981, #059669); color: #fff; border-bottom-right-radius: 4px; }
    .msg-admin { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(5px); color: #e2e8f0; border-bottom-left-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.05); }
    .msg-image { max-width: 100%; border-radius: 10px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.2); }

    /* Controls & Inputs */
    .input-area { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); padding: 15px 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
    .box-layout { display: flex; gap: 10px; align-items: center; }
    
    input[type="text"], textarea { width: 100%; padding: 14px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.6); color: #fff; outline: none; font-size: 15px; transition: 0.3s; }
    input[type="text"]:focus, textarea:focus { border-color: #10b981; background: rgba(15, 23, 42, 0.9); }
    
    .action-btn { background: linear-gradient(135deg, #10b981, #059669); color: #fff; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 16px; transition: 0.3s; width: 100%; }
    .action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }
    
    .icon-btn { background: rgba(51, 65, 85, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: #fff; transition: 0.3s; flex-shrink: 0; }
    .icon-btn:hover { background: #10b981; color: white; }
    
    .send-btn { width: auto; border-radius: 12px; padding: 0 20px; display: flex; align-items: center; justify-content: center; height: 50px; flex-shrink: 0; background: linear-gradient(135deg, #10b981, #059669); border: none; color: white; cursor: pointer;}

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.5); border-radius: 10px; }
</style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="admin-avatar-header" id="globalAdminAvatar">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <div class="header-info">
            <h2>مركز دعم Fawakih AI</h2>
            <p id="statusIndicator" class="status-text status-online-text">● جاري التحقق...</p>
        </div>
    </div>
    <button id="offlineRequestBtn" onclick="requestOfflineSupport()">تفعيل الدعم</button>
</div>

<div id="nameScreen" class="screen">
    <div class="form-card">
        <h3>مرحباً بك! 👋</h3>
        <p>يرجى إدخال اسمك لنتمكن من خدمتك بشكل أفضل.</p>
        <input type="text" id="userName" placeholder="الاسم الكريم..." style="margin-bottom:15px;">
        <button class="action-btn" onclick="saveName()">المتابعة</button>
    </div>
</div>

<div id="problemScreen" class="screen hidden">
    <div class="form-card">
        <h3>كيف يمكننا مساعدتك؟ 🎧</h3>
        <p>اشرح مشكلتك بوضوح ليتمكن فريقنا التقني من حلها.</p>
        <textarea id="problemDesc" rows="4" placeholder="اكتب تفاصيل المشكلة هنا..." style="margin-bottom:15px;"></textarea>
        <button class="action-btn" onclick="submitProblem()">فتح تذكرة الدعم</button>
    </div>
</div>

<div id="chatScreen" class="screen hidden">
    <div class="chat-container" id="chat"></div>
    <div class="input-area">
        <div class="box-layout">
            <button class="icon-btn" onclick="document.getElementById('imageInput').click()" title="إرفاق صورة">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </button>
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <input type="text" id="msgInput" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">إرسال</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3eRFHDhOtKlli3KA8vUyE1--C5F47UYw",
  authDomain: "chatapi-1ca71.firebaseapp.com",
  databaseURL: "https://chatapi-1ca71-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "chatapi-1ca71"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let userId = localStorage.getItem("fawakih_uid") || ("u_" + Date.now());
localStorage.setItem("fawakih_uid", userId);

let savedName = localStorage.getItem("fawakih_uname");
let hasProblem = localStorage.getItem("fawakih_problem_sent");
let adminAvatarData = null; 
let isAdminOnline = true;

// 1. مراقبة حالة الأونلاين وصورة الأدمن
onValue(ref(db, 'admin_settings'), (snapshot) => {
    const data = snapshot.val();
    if(data) {
        // تحديث صورة الأدمن
        if(data.adminAvatar) {
            adminAvatarData = data.adminAvatar;
            document.getElementById("globalAdminAvatar").innerHTML = `<img src="${data.adminAvatar}">`;
            // تحديث الصور الموجودة داخل الدردشة مسبقاً
            document.querySelectorAll('.msg-avatar').forEach(el => {
                el.innerHTML = `<img src="${data.adminAvatar}">`;
            });
        }
        
        // تحديث حالة الاتصال
        isAdminOnline = data.isOnline !== false;
        const statusEl = document.getElementById("statusIndicator");
        const offlineBtn = document.getElementById("offlineRequestBtn");
        
        if(isAdminOnline) {
            statusEl.innerText = "● متصل الآن - نرد خلال دقائق";
            statusEl.className = "status-text status-online-text";
            offlineBtn.style.display = "none";
        } else {
            statusEl.innerText = "● غير متصل الآن";
            statusEl.className = "status-text status-offline-text";
            if(hasProblem) offlineBtn.style.display = "block";
        }
    }
});

// تفعيل الدعم الأوفلاين
window.requestOfflineSupport = async function() {
    await push(ref(db, `support_chats/${userId}/messages`), {
        sender: "user",
        message: "🔔 طلب العميل تفعيل الدعم الفني (تنبيه أوفلاين)",
        timestamp: serverTimestamp()
    });
    set(ref(db, `support_chats/${userId}/info/lastUpdate`), Date.now());
    alert("تم تنبيه الدعم الفني، يرجى ترك رسالتك أو صورتك وسنرد عليك بأقرب وقت 🍏");
    document.getElementById("offlineRequestBtn").style.display = "none";
};

// ضغط الصور باحترافية وتوفير المساحة
window.handleImageUpload = function(event) {
    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 600; // حجم ممتاز لتوفير البيانات
            let width = img.width; let height = img.height;
            
            if (width > height && width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } 
            else if (height > MAX_WIDTH) { width *= MAX_WIDTH / height; height = MAX_WIDTH; }
            
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            // ضغط إلى WebP يقلل المساحة بشكل ضخم جداً للقاعدة
            const base64Compressed = canvas.toDataURL('image/webp', 0.6); 
            sendImageMessage(base64Compressed);
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
};

// إرسال الصورة
async function sendImageMessage(base64Img) {
    await push(ref(db, `support_chats/${userId}/messages`), {
        sender: "user",
        message: "أرسل صورة للمشكلة 📷",
        image: base64Img,
        timestamp: serverTimestamp()
    });
    set(ref(db, `support_chats/${userId}/info/lastMessage`), "📷 أرسل صورة");
    set(ref(db, `support_chats/${userId}/info/lastUpdate`), Date.now());
}

window.saveName = function() {
    const name = document.getElementById("userName").value.trim();
    if (name.length < 2) { alert("يرجى إدخال اسم صحيح"); return; }
    savedName = name;
    localStorage.setItem("fawakih_uname", name);
    showScreen();
};

window.submitProblem = async function() {
    const desc = document.getElementById("problemDesc").value.trim();
    if (desc.length < 5) { alert("يرجى شرح المشكلة بمزيد من التفاصيل"); return; }
    
    try {
        await push(ref(db, `support_chats/${userId}/messages`), {
            sender: "user", message: "⚠️ تفاصيل المشكلة: " + desc, timestamp: serverTimestamp()
        });
        await set(ref(db, `support_chats/${userId}/info`), {
            name: savedName, status: "open", lastMessage: desc, lastUpdate: Date.now()
        });

        localStorage.setItem("fawakih_problem_sent", "true");
        hasProblem = "true";
        showScreen();
    } catch (e) { alert("خطأ في الاتصال، يرجى المحاولة لاحقاً."); }
};

window.sendMessage = async function() {
    const input = document.getElementById("msgInput");
    const text = input.value.trim();
    if (text === "") return;

    await push(ref(db, `support_chats/${userId}/messages`), {
        sender: "user", message: text, timestamp: serverTimestamp()
    });
    
    set(ref(db, `support_chats/${userId}/info/lastMessage`), text);
    set(ref(db, `support_chats/${userId}/info/lastUpdate`), Date.now());
    input.value = "";
};

function showScreen() {
    document.getElementById("nameScreen").classList.add("hidden");
    document.getElementById("problemScreen").classList.add("hidden");
    document.getElementById("chatScreen").classList.add("hidden");

    if (!savedName) { document.getElementById("nameScreen").classList.remove("hidden"); } 
    else if (!hasProblem) { document.getElementById("problemScreen").classList.remove("hidden"); } 
    else { document.getElementById("chatScreen").classList.remove("hidden"); loadMessages(); }
}

function loadMessages() {
    const chatDiv = document.getElementById("chat");
    onValue(ref(db, `support_chats/${userId}/messages`), (snapshot) => {
        chatDiv.innerHTML = "";
        snapshot.forEach(child => {
            const data = child.val();
            const isUser = data.sender === "user";
            let content = data.message;
            if(data.image) content += `<br><img src="${data.image}" class="msg-image">`;
            
            if (isUser) {
                chatDiv.innerHTML += `<div class="msg-row user"><div class="msg-bubble msg-user">${content}</div></div>`;
            } else {
                let avatarHTML = adminAvatarData ? `<img src="${adminAvatarData}">` : `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`;
                chatDiv.innerHTML += `
                    <div class="msg-row admin">
                        <div class="msg-avatar">${avatarHTML}</div>
                        <div class="msg-bubble msg-admin">${content}</div>
                    </div>
                `;
            }
        });
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });
}

showScreen();
</script>

</body>
</html>
