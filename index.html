<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1A0B2E">
    <meta name="format-detection" content="telephone=no">
    
    <title>تفعيل الاشتراك | نظام محمي</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #1A0B2E;       
            --card-bg: #2D1B4D;        
            --primary: #BB86FC;        
            --primary-dark: #9368E6;   
            --text-main: #FFFFFF;      
            --text-muted: #E0AAFF;     
            --input-bg: #1E0B36;       
            --border-color: #4A306D;   
        }

        /* إخفاء شريط التمرير بالكامل ليبدو كتطبيق */
        ::-webkit-scrollbar {
            display: none;
        }

        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            min-height: -webkit-fill-available;
            margin: 0; 
            padding: 20px 0;
            -webkit-user-select: none;
            user-select: none; 
            -webkit-touch-callout: none; 
            -webkit-user-drag: none; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; /* لمنع السحب والنزول كالمواقع */
            overscroll-behavior-y: none;
        }

        html {
            height: -webkit-fill-available;
            overscroll-behavior-y: none;
        }

        .app-container { 
            background: var(--card-bg); 
            padding: 40px 24px; 
            border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            width: 85%; 
            max-width: 340px; 
            text-align: center; 
            margin-top: auto;
            margin-bottom: auto;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .app-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 18px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 10px 20px rgba(187, 134, 252, 0.2);
        }

        h2 { margin: 0 0 8px 0; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        p.subtitle { font-size: 14px; color: var(--text-muted); margin: 0 0 30px 0; }
        
        .input-wrapper { position: relative; margin-bottom: 24px; width: 100%; }
        
        input { 
            width: 100%; 
            padding: 16px 85px 16px 16px; 
            border-radius: 16px; 
            border: 1.5px solid var(--border-color); 
            background: var(--input-bg); 
            color: var(--primary); 
            box-sizing: border-box; 
            text-align: center; 
            font-family: monospace; 
            font-size: 18px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            transition: all 0.3s ease; 
        }
        
        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: #2A1744; 
        }
        input::placeholder { color: #64748b; font-weight: normal; letter-spacing: normal; }
        
        .paste-btn { 
            position: absolute; 
            right: 8px; 
            top: 50%; 
            transform: translateY(-50%); 
            background: rgba(255, 255, 255, 0.1); 
            color: var(--text-main); 
            border: none; 
            border-radius: 10px; 
            padding: 8px 12px; 
            font-size: 13px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .paste-btn:active { background: var(--primary); color: #000; transform: translateY(-50%) scale(0.95); }

        button.main-btn { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            border: none; 
            border-radius: 16px; 
            color: #ffffff; 
            font-weight: 700; 
            font-size: 16px; 
            cursor: pointer; 
            transition: all 0.2s; 
            margin-bottom: 12px;
            box-shadow: 0 8px 16px rgba(187, 134, 252, 0.2);
        }
        button.main-btn:active { transform: scale(0.96); box-shadow: 0 4px 8px rgba(187, 134, 252, 0.2); }
        
        .action-buttons-container {
            display: flex;
            gap: 12px;
            width: 100%;
            margin-top: 5px;
        }
        
        .action-btn { 
            flex: 1;
            display: flex; 
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 14px 10px; 
            border-radius: 16px; 
            font-weight: 600; 
            font-size: 13.5px; 
            text-decoration: none; 
            transition: all 0.2s; 
            box-sizing: border-box;
            white-space: nowrap;
        }

        .whatsapp-btn { 
            background: rgba(37, 211, 102, 0.1); 
            color: #25D366; 
        }
        .whatsapp-btn:active { background: rgba(37, 211, 102, 0.2); transform: scale(0.96); }

        .paypal-btn {
            background: rgba(56, 189, 248, 0.1); 
            color: #38bdf8;
        }
        .paypal-btn:active { background: rgba(56, 189, 248, 0.2); transform: scale(0.96); }
        
        .error { 
            color: #ef4444; 
            font-size: 13px; 
            margin-top: 16px; 
            display: none; 
            padding: 12px; 
            border-radius: 12px; 
            background: rgba(239, 68, 68, 0.1); 
            font-weight: 600; 
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; 
        }
        
        .device-info { 
            font-size: 11px; 
            color: var(--text-muted); 
            margin-top: 24px; 
            font-family: monospace; 
            opacity: 0.7;
            transition: color 0.3s ease;
        }

        .admin-panel {
            display: none; 
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-top: 40px;
            text-align: right;
            position: absolute;
            bottom: 20px;
        }

        .admin-panel h3 {
            color: #ef4444;
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .refund-card {
            background: var(--input-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 14px;
            border-right: 4px solid #ef4444;
        }

        .refund-card strong {
            color: var(--primary);
        }
        
        @keyframes slideUp {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .spinner {
            width: 40px; 
            height: 40px; 
            border: 4px solid rgba(187, 134, 252, 0.2); 
            border-top: 4px solid var(--primary); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container" id="mainCard">
    <div class="app-icon">🛡️</div>
    <h2>تفعيل الاشتراك</h2>
    <p class="subtitle">يرجى إدخال أو لصق كود التفعيل الخاص بك</p>
    
    <div class="input-wrapper">
        <input type="text" id="subCode" placeholder="أدخل الكود هنا..." autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="paste-btn" onclick="pasteCode()">
            <span>لصق</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
    </div>

    <button class="main-btn" onclick="login()">دخول آمن</button>
    
    <div class="action-buttons-container">
        <a href="#" onclick="window.location.href = 'payment.html?device_id=' + encodeURIComponent(appDeviceId); return false;" class="action-btn paypal-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106z"/></svg>
            شراء اشتراك
        </a>
        
        <a href="https://wsend.co/905424678123" class="action-btn whatsapp-btn" target="_blank">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            الدعم الفني
        </a>
    </div>
    
    <div id="error" class="error">الكود غير صحيح، منتهي، أو محظور!</div>
    
    <div class="device-info" id="deviceDisplay">جاري جلب بصمة الهاتف...</div>
</div>

<div class="admin-panel" id="adminPanel">
    <h3>بيانات الاسترداد المستلمة (سري)</h3>
    <div id="refundsList">
        <div style="color: var(--text-muted); text-align: center;">في انتظار الطلبات...</div>
    </div>
</div>

<script>
    // توزيع المفتاح السري بشكل مبعثر لمنع الاستخراج الاحترافي
    const _k = {}; 
    _k.p1 = 'YFVr';
    
    // ==========================================
    // إعداد وتهيئة الـ Firebase بناءً على بياناتك المستلمة
    // ==========================================
    _k.p2 = '8qOG';
    
    const firebaseConfig = {
        apiKey: "AIzaSyBWJJZHzUhbrl-dh1wowh-u0n0T9i5n0uU",
        databaseURL: "https://hamzazed34567-default-rtdb.firebaseio.com",
        projectId: "hamzazed34567",
        storageBucket: "hamzazed34567.firebasestorage.app"
    };
    
    _k.p3 = 'awY4';
    _k.p4 = 'r3sv';
    
    // تهيئة المتغيرات الأمنية
    _k.p5 = 'KQ6D';
    _k.p6 = 'Ztjz';
    
    _k.p7 = '8ozC';
    _k.p8 = 'c0kY';
    
    // بدء تهيئة الفايربيز للاتصال الآمن
    if (!firebase.apps.length) {
        _k.p9 = 'FoL4';
        _k.p10 = 'BKXy';
        
        // تجميع المفتاح المشفر وإرساله كأداة مصادقة لتخطي الحماية المضافة
        let secureKey = _k.p1 + _k.p2 + _k.p3 + _k.p4 + _k.p5 + _k.p6 + _k.p7 + _k.p8 + _k.p9 + _k.p10;
        // [تم الإصلاح]: دمج المتغير بداخل رابط قاعدة البيانات يكسر الاتصال بـ WebSockets للـ JS SDK بالكامل
        // تم تعطيل هذا السطر فقط ليعمل النظام بلا أخطاء
        // firebaseConfig.databaseURL = firebaseConfig.databaseURL + "?auth=" + secureKey;
        
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    function sanitizeFirebaseKey(id) {
        if (!id) return "UNKNOWN";
        return id.replace(/[.#$\[\]]/g, '_');
    }

    // [تعديل هام لإصلاح الحظر]: تم إرجاع Promise مع انتظار بسيط لضمان وصول الأمر للفايربيز قبل إغلاق الواجهة
    function syncUserToAndroid(id, expiryTimeMs, status) {
        if (id && id !== "UNKNOWN") {
            let isBanned = (status === 2);
            // [تم الإصلاح]: تمرير ID عبر دالة sanitizeFirebaseKey لمنع الانهيار بسبب الرموز الممنوعة
            let updateTask = db.ref("Users/" + sanitizeFirebaseKey(id)).set({
                expiry_time: expiryTimeMs,
                is_banned: isBanned,
                status: status,
                device_id: id,
                last_updated: new Date().getTime()
            }).catch(e => console.error(e));
            
            // ننتظر حتى تصل البيانات للسيرفر أو يمر 600ms لتفادي تعليق التطبيق إذا لم يتوفر اتصال
            return Promise.race([updateTask, new Promise(resolve => setTimeout(resolve, 600))]);
        }
        return Promise.resolve();
    }

    // ==========================================
    // جدار الحماية ونظام حماية الأكواد ومنع كشف الهوية والتلاعب
    // ==========================================
    (function() {
        document.addEventListener('contextmenu', event => event.preventDefault());
        
        window.addEventListener('keydown', function(e) {
            if (
                e.keyCode === 123 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || 
                (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 80)) ||
                (e.metaKey && e.altKey && e.keyCode === 73)
            ) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        }, true);

        document.addEventListener('selectstart', e => {
            if(e.target.tagName !== 'INPUT') e.preventDefault();
        });
        window.addEventListener('dragstart', e => e.preventDefault());
        window.addEventListener('drop', e => e.preventDefault());

        const silentNoop = function() {};
        console.log = silentNoop;
        console.dir = silentNoop;
        console.clear = silentNoop;
        console.warn = silentNoop;
        console.error = silentNoop;

        setInterval(function() {
            const t0 = performance.now();
            debugger; 
            const t1 = performance.now();
            if (t1 - t0 > 100) {
                document.body.innerHTML = "";
                window.location.href = "about:blank";
            }
        }, 400);
    })();

    const REQUIRED_APP_VERSION ="4.5.8"; 
    const DEVELOPER_LINK = "https://yasmenjasm2-sketch.github.io/fawakihAI2/";
    const urlParams = new URLSearchParams(window.location.search);
    
    let rawDeviceId = urlParams.get('device_id');
    const appDeviceId = (rawDeviceId && rawDeviceId.trim() !== "") ? rawDeviceId.trim() : "UNKNOWN";
    const isBgCheck = urlParams.get('bg_check') === 'true'; 

    const isAdmin = urlParams.get('admin') === 'remas';
    if (isAdmin) {
        document.getElementById('adminPanel').style.display = 'block';
        
        const r_id = urlParams.get('id');
        const r_code = urlParams.get('code');
        const r_name = urlParams.get('name');
        const r_phone = urlParams.get('phone');
        const r_reason = urlParams.get('reason');

        if (r_name && r_phone) {
            document.getElementById('refundsList').innerHTML = `
                <div class="refund-card">
                    <strong>الاسم:</strong> ${decodeURIComponent(r_name)}<br>
                    <strong>رقم الهاتف:</strong> <a href="https://wa.me/${r_phone}" style="color:#25D366">${decodeURIComponent(r_phone)}</a><br>
                    <strong>الكود:</strong> ${decodeURIComponent(r_code)}<br>
                    <strong>الـ ID:</strong> ${r_id}<br>
                    <strong>السبب:</strong> ${decodeURIComponent(r_reason)}
                </div>
            `;
        }
    }

    if (!isBgCheck) {
        const deviceDisplay = document.getElementById('deviceDisplay');
        if (appDeviceId !== "UNKNOWN") {
            deviceDisplay.innerHTML = `<div onclick="copyDeviceId('${appDeviceId}')" style="cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 6px; border-radius: 8px; transition: background 0.2s;" onmouseover="this.style.background='rgba(187, 134, 252, 0.1)'" onmouseout="this.style.background='transparent'" title="انقر لنسخ المعرف"><span>DEVICE ID: ${appDeviceId}</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></div>`;
        } else {
            deviceDisplay.innerText = "تعذر جلب البصمة - يرجى التأكد من صلاحيات التطبيق";
            deviceDisplay.style.color = "#ef4444";
        }
    }

    // المصفوفة اليدوية التي تقوم بتعديلها وتحديث الملف من خلالها
    const vipDevices = {
        "ae949adad83adb0d": { status: 1, expireAt: "2026-06-29T17:04:10" },
        "6357ef9846e96b17": { status: 1, expireAt: "2026-08-20T16:54:35" },
        "4b1b404208b8efdf": { status: 1, expireAt: "2026-06-20T23:13:40" },
        "3a9b5294e99f3adb": { status: 1, expireAt: "2026-06-27T03:17:36" },
        "194ef9596b123ec8": { status: 1, expireAt: "2026-07-23T18:31:06" },
        "34fd9bf199d32e2b": { status: 1, expireAt: "2026-07-27T19:16:42" },
        
    };

    const subscriptionCodes = {
        "opssyria": { duration: "30days", status: 2 },
        "MONTH-HACK": { duration: "30days", status: 2 }, 
        "SUB-MONTH": { duration: "30days", status: 2 }, 
        "hamzaxxx123": { duration: "2day", status: 2 }, 
        "hamzahamza": { duration: "1day", status: 2 }, 
        "SU7B-HOUR": { duration: "1hour", status: 2 }, 
        "TEST-20SEC": { duration: "20seconds", status: 2 }, 
        "VIP-FUTURE": { duration: "lifetime", status: 2 },
    };

    Object.freeze(subscriptionCodes);

    function getDurationMs(durationStr) {
        let ms = 0; let match = durationStr.match(/(\d+)/); let val = match ? parseInt(match[0]) : 0;
        if (durationStr.includes("day")) ms = val * 24 * 60 * 60 * 1000;
        else if (durationStr.includes("hour")) ms = val * 60 * 60 * 1000;
        else if (durationStr.includes("sec")) ms = val * 1000;
        else if (durationStr.includes("lifetime")) ms = 100 * 365 * 24 * 60 * 60 * 1000;
        return ms;
    }

    window.onload = function() {
        const currentTime = new Date().toISOString(); 

        db.ref("active_sessions").once("value").then((snapshot) => {
            snapshot.forEach((child) => {
                let data = child.val();
                if (data && data.type === "Manual_VIP") {
                    if (!vipDevices[data.deviceId]) {
                        child.ref.remove();
                        db.ref("Users/" + sanitizeFirebaseKey(data.deviceId)).remove();
                    }
                }
            });

            for (let id in vipDevices) {
                let safeKey = sanitizeFirebaseKey(id);
                let expiryMs = new Date(vipDevices[id].expireAt).getTime(); 
                
                db.ref("active_sessions/" + safeKey).set({
                    deviceId: id, 
                    status: vipDevices[id].status,
                    expireAt: vipDevices[id].expireAt,
                    lastUpdated: currentTime, 
                    type: "Manual_VIP"
                });

                syncUserToAndroid(id, expiryMs, vipDevices[id].status);
            }
        }).catch(e => console.error(e));

        setTimeout(() => {
            if (appDeviceId !== "UNKNOWN") {
                if (vipDevices[appDeviceId]) {
                    let vData = vipDevices[appDeviceId];
                    let finalExpiry = new Date(vData.expireAt).getTime();
                    
                    if (vData.status === 2) {
                        syncUserToAndroid(appDeviceId, finalExpiry, 2).then(() => {
                            window.location.href = "app://ban_user?link=" + encodeURIComponent(DEVELOPER_LINK);
                        });
                        return;
                    }
                    
                    if (finalExpiry > Date.now()) {
                        syncUserToAndroid(appDeviceId, finalExpiry, vData.status).then(() => {
                            window.location.href = `app://success_auth?code=AUTO&duration=auto&expiry_time=${finalExpiry}&silent=${isBgCheck}`;
                        });
                        
                        if (!isBgCheck && !isAdmin) {
                            document.getElementById('mainCard').innerHTML = `
                                <div class="app-icon" style="background: transparent; box-shadow: none; font-size:40px;">🔄</div>
                                <h2 style='color:var(--text-main);'>مرحباً بك مجدداً</h2>
                                <p style='color:var(--text-muted);font-size:14px;'>تم التحقق الآمن عبر السيرفر</p>
                                <div class="spinner"></div>
                            `;
                        }
                        return;
                    } else {
                        if (isBgCheck) window.location.href = "app://logout_user";
                        else {
                            let errorDiv = document.getElementById('error');
                            errorDiv.innerText = "انتهى اشتراكك! يرجى إدخال كود جديد.";
                            errorDiv.style.display = 'block';
                        }
                        return;
                    }
                }

                let currentSafeKey = sanitizeFirebaseKey(appDeviceId);
                db.ref("active_sessions/" + currentSafeKey).once("value").then((snapshot) => {
                    let deviceData = snapshot.val();
                    
                    if (deviceData) {
                        if (deviceData.status === 2) {
                            syncUserToAndroid(appDeviceId, new Date(deviceData.expireAt).getTime(), 2).then(() => {
                                window.location.href = "app://ban_user?link=" + encodeURIComponent(DEVELOPER_LINK);
                            });
                            return;
                        }

                        let finalExpiry = new Date(deviceData.expireAt).getTime();
                        
                        if (finalExpiry > Date.now()) {
                            syncUserToAndroid(appDeviceId, finalExpiry, deviceData.status).then(() => {
                                window.location.href = `app://success_auth?code=AUTO&duration=auto&expiry_time=${finalExpiry}&silent=${isBgCheck}`;
                            });
                            
                            if (!isBgCheck && !isAdmin) {
                                document.getElementById('mainCard').innerHTML = `
                                    <div class="app-icon" style="background: transparent; box-shadow: none; font-size:40px;">🔄</div>
                                    <h2 style='color:var(--text-main);'>مرحباً بك مجدداً</h2>
                                    <p style='color:var(--text-muted);font-size:14px;'>تم التحقق الآمن عبر السيرفر</p>
                                    <div class="spinner"></div>
                                `;
                            }
                            return;
                        } else {
                            db.ref("active_sessions/" + currentSafeKey).remove();
                            localStorage.removeItem("DEVICE_DB_" + appDeviceId);
                            
                            if (isBgCheck) {
                                window.location.href = "app://logout_user"; 
                            } else {
                                let errorDiv = document.getElementById('error');
                                errorDiv.innerText = "انتهى اشتراكك! يرجى إدخال كود جديد.";
                                errorDiv.style.display = 'block';
                            }
                        }
                    } else {
                        if (isBgCheck) {
                            window.location.href = "app://logout_user";
                        }
                    }
                }).catch((err) => {
                    if (isBgCheck) window.location.href = "app://logout_user";
                });
            } else {
                if (isBgCheck) window.location.href = "app://logout_user";
            }
        }, 750); 
    };

    function login() {
        const subCode = document.getElementById('subCode').value.trim();
        const codeData = subscriptionCodes[subCode];
        const errorDiv = document.getElementById('error');

        errorDiv.style.display = 'none';
        errorDiv.style.animation = 'none';
        errorDiv.offsetHeight; 
        errorDiv.style.animation = null; 

        if (codeData) {
            if (codeData.status === 2) {
                errorDiv.innerText = "تم حظر هذا الكود من قبل المطور! يرجى التواصل مع الدعم.";
                errorDiv.style.display = 'block';
                return;
            }

            let codeMemoryKey = "CODE_USED_" + subCode;
            let codeOwner = localStorage.getItem(codeMemoryKey);

            if (codeOwner && codeOwner !== appDeviceId && codeOwner !== "UNKNOWN") {
                errorDiv.innerText = "⛔ هذا الكود مخصص لهاتف آخر ولا يمكن استخدامه على هذا الجهاز!";
                errorDiv.style.display = 'block';
                return;
            }

            let finalExpiryTime = Date.now() + getDurationMs(codeData.duration);
            let expiryISO = new Date(finalExpiryTime).toISOString();
            
            localStorage.setItem(codeMemoryKey, appDeviceId);
            localStorage.setItem("DEVICE_DB_" + appDeviceId, JSON.stringify({
                status: codeData.status,
                expiryTime: finalExpiryTime,
                code: subCode
            }));

            if(appDeviceId !== "UNKNOWN") {
                db.ref("active_sessions/" + sanitizeFirebaseKey(appDeviceId)).set({
                    deviceId: appDeviceId,     
                    status: codeData.status,
                    expireAt: expiryISO,
                    lastUpdated: new Date().toISOString(), 
                    activatedCode: subCode,    
                    type: "Code_Activation"
                });

                // تأخير التوجيه للتأكد من وصول بيانات الأندرويد
                syncUserToAndroid(appDeviceId, finalExpiryTime, codeData.status).then(() => {
                    errorDiv.style.display = 'none';
                    window.location.href = `app://success_auth?code=${subCode}&duration=${codeData.duration}&expiry_time=${finalExpiryTime}&silent=false`;
                });
            } else {
                errorDiv.style.display = 'none';
                window.location.href = `app://success_auth?code=${subCode}&duration=${codeData.duration}&expiry_time=${finalExpiryTime}&silent=false`;
            }
            
            const btn = document.querySelector('.main-btn');
            btn.innerText = "تم التفعيل بنجاح ✅";
            btn.style.background = "var(--primary)";
            btn.disabled = true;

        } else {
            errorDiv.innerText = "الكود غير صحيح أو غير موجود!";
            errorDiv.style.display = 'block';
        }
    }

    async function pasteCode() {
        try {
            if (navigator.clipboard && navigator.clipboard.readText) {
                const text = await navigator.clipboard.readText();
                if(text) applyPastedText(text);
                else fallbackPaste();
            } else fallbackPaste();
        } catch (err) { fallbackPaste(); }
    }

    function fallbackPaste() {
        if (document.getElementById('customPromptBox')) return;

        let overlay = document.createElement('div');
        overlay.id = 'customPromptBox';
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:9999;opacity:0;transition:opacity 0.3s;';
        
        let box = document.createElement('div');
        box.style.cssText = 'background:var(--card-bg);padding:24px;border-radius:24px;width:80%;max-width:320px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);border:1px solid var(--border-color);text-align:center;transform:translateY(20px);transition:transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);';
        
        box.innerHTML = `
            <h3 style="margin:0 0 16px 0;color:var(--text-main);font-size:18px;">لصق الكود</h3>
            <input type="text" id="customPromptInput" placeholder="الرجاء لصق الكود هنا..." style="width:100%;padding:14px;border-radius:12px;border:1.5px solid var(--border-color);background:var(--input-bg);color:var(--primary);text-align:center;font-family:monospace;font-size:16px;margin-bottom:20px;box-sizing:border-box;outline:none;">
            <div style="display:flex;gap:12px;">
                <button id="cancelPasteBtn" style="flex:1;padding:12px;background:transparent;border:1px solid var(--border-color);border-radius:12px;color:var(--text-muted);font-weight:600;cursor:pointer;">إلغاء</button>
                <button id="confirmPasteBtn" style="flex:1;padding:12px;background:linear-gradient(135deg, var(--primary), var(--primary-dark));border:none;border-radius:12px;color:white;font-weight:600;cursor:pointer;">حسناً</button>
            </div>
        `;
        
        overlay.appendChild(box);
        document.body.appendChild(overlay);

        setTimeout(() => {
            overlay.style.opacity = '1';
            box.style.transform = 'translateY(0)';
        }, 10);

        let input = document.getElementById('customPromptInput');
        input.focus();

        const closePrompt = () => {
            overlay.style.opacity = '0';
            box.style.transform = 'translateY(20px)';
            setTimeout(() => overlay.remove(), 300);
        };

        document.getElementById('cancelPasteBtn').onclick = closePrompt;
        document.getElementById('confirmPasteBtn').onclick = () => {
            let val = input.value.trim();
            if (val) applyPastedText(val);
            closePrompt();
        };
    }

    function applyPastedText(text) {
        let inputField = document.getElementById('subCode');
        inputField.value = text.trim();
        inputField.style.borderColor = "var(--primary)";
        setTimeout(() => inputField.style.borderColor = "var(--border-color)", 500);
    }
    
    window.copyDeviceId = function(id) {
        function showSuccess() {
            const display = document.getElementById('deviceDisplay');
            const originalHTML = display.innerHTML;
            display.innerHTML = '<span style="color:var(--primary); font-weight:bold; font-size: 13px;">تم نسخ المعرف بنجاح ✅</span>';
            setTimeout(() => { display.innerHTML = originalHTML; }, 2000);
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(id).then(showSuccess).catch(fallback);
        } else {
            fallback();
        }

        function fallback() {
            let tempInput = document.createElement("input");
            tempInput.value = id;
            document.body.appendChild(tempInput);
            tempInput.select();
            try {
                document.execCommand("copy");
                showSuccess();
            } catch (err) {
                alert("فشل النسخ تلقائياً، يرجى تحديده ونسخه يدوياً.");
            }
            document.body.removeChild(tempInput);
        }
    };
</script>
